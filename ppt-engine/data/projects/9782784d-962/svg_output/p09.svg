    <text x="640" y="445" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="76" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Q &amp; A</text>
    <line x1="500" y1="485" x2="780" y2="485" stroke="#FF6B35" stroke-width="5" stroke-linecap="round"/>
    <text x="640" y="545" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="normal" fill="#FFFFFF" text-anchor="middle" opacity="0.95">FDE — 技术的前线，价值的起点</text>
