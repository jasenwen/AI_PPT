<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFF8F0"/>
  
  <!-- 有机装饰元素 -->
  <circle cx="1150" cy="120" r="220" fill="#FF6B35" opacity="0.06"/>
  <circle cx="120" cy="620" r="190" fill="#FFA500" opacity="0.08"/>
  <path d="M 0 0 L 280 0 Q 140 90 0 180 Z" fill="#FF8C42" opacity="0.12"/>
  <path d="M 1280 720 L 1000 720 Q 1140 630 1280 540 Z" fill="#FF6B35" opacity="0.05"/>
  
  <!-- 左上角橙色装饰条 -->
  <rect x="0" y="0" width="140" height="10" fill="#FF6B35"/>
  <rect x="0" y="10" width="90" height="6" fill="#FFA500"/>
  
  <!-- 标题 -->
  <text x="640" y="95" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#FF6B35" text-anchor="middle">FDE vs 传统软件工程师</text>
  <line x1="520" y1="115" x2="760" y2="115" stroke="#FF6B35" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  
  <!-- 左侧卡片：传统工程师 -->
  <g id="traditional-engineer">
    <rect x="100" y="160" width="460" height="500" rx="20" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="2"/>
    <circle cx="330" cy="235" r="42" fill="#FFF8F0" stroke="#FF6B35" stroke-width="2"/>
    <text x="330" y="252" font-family="Arial" font-size="38" text-anchor="middle">👨‍💻</text>
    
    <text x="140" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D3436">传统软件工程师</text>
    <line x1="140" y1="340" x2="230" y2="340" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
    
    <text x="140" y="395" font-family="Arial, sans-serif" font-size="24" fill="#2D3436">• 聚焦产品研发，离客户远，迭代周期长</text>
    <text x="140" y="445" font-family="Arial, sans-serif" font-size="24" fill="#2D3436">• 需求传递链条长，反馈滞后</text>
    <text x="140" y="495" font-family="Arial, sans-serif" font-size="24" fill="#2D3436">• 侧重代码实现与内部系统架构</text>
    
    <circle cx="510" cy="620" r="28" fill="#FFA500" opacity="0.15"/>
  </g>
  
  <!-- 右侧卡片：FDE -->
  <g id="fde-role">
    <rect x="720" y="160" width="460" height="500" rx="20" fill="#FFFFFF" stroke="#FF6B35" stroke-width="3"/>
    <circle cx="950" cy="235" r="42" fill="#FFF8F0" stroke="#FF6B35" stroke-width="2"/>
    <text x="950" y="252" font-family="Arial" font-size="38" text-anchor="middle">🤝</text>
    
    <text x="760" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF6B35">FDE 前线工程师</text>
    <line x1="760" y1="340" x2="850" y2="340" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
    
    <text x="760" y="395" font-family="Arial, sans-serif" font-size="24" fill="#2D3436">• 驻扎客户一线，直面真实问题，快速响应变化</text>
    <text x="760" y="445" font-family="Arial, sans-serif" font-size="24" fill="#2D3436">• 需要更强的沟通、咨询和业务分析能力</text>
    
    <text x="760" y="505" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF6B35">🔹 角色定位：「技术翻译官」</text>
    <text x="760" y="545" font-family="Arial, sans-serif" font-size="22" fill="#FF8C42">把客户语言精准翻译成技术方案</text>
    
    <circle cx="740" cy="180" r="26" fill="#FF6B35" opacity="0.12"/>
  </g>
  
  <!-- 中心对比与连接元素 -->
  <g id="comparison-center">
    <circle cx="640" cy="410" r="48" fill="#FF6B35"/>
    <text x="640" y="426" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VS</text>
    <path d="M 560 410 Q 600 375 640 410" fill="none" stroke="#FFA500" stroke-width="3" stroke-dasharray="6,4"/>
    <path d="M 720 410 Q 680 445 640 410" fill="none" stroke="#FFA500" stroke-width="3" stroke-dasharray="6,4"/>
    <circle cx="640" cy="410" r="60" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.2"/>
  </g>
  
  <!-- 页码 -->
  <text x="1200" y="700" font-family="Arial, sans-serif" font-size="16" fill="#999999" text-anchor="end">4 / 9</text>
</svg>