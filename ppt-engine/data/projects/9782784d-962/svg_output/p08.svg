<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#FFF8F0"/>
  
  <g id="bg-decorations">
    <circle cx="1150" cy="100" r="200" fill="#FFA500" opacity="0.07"/>
    <circle cx="100" cy="650" r="250" fill="#FF8C42" opacity="0.06"/>
    <circle cx="640" cy="360" r="320" fill="#FF6B35" opacity="0.04"/>
    <path d="M 1050 680 Q 1120 600 1200 650" fill="none" stroke="#FF6B35" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <circle cx="1180" cy="160" r="30" fill="#FF8C42" opacity="0.5"/>
    <circle cx="1220" cy="130" r="18" fill="#FFA500" opacity="0.6"/>
    <circle cx="80" cy="520" r="40" fill="#FF6B35" opacity="0.2"/>
  </g>
  
  <g id="top-bar">
    <rect x="0" y="0" width="160" height="16" fill="#FF6B35" rx="8"/>
    <circle cx="24" cy="8" r="5" fill="#FFFFFF" opacity="0.9"/>
  </g>
  
  <g id="title-section">
    <text x="100" y="105" font-family="'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif" font-size="48" font-weight="bold" fill="#FF6B35">FDE 的价值 — 管理层视角</text>
    <text x="100" y="145" font-family="'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif" font-size="20" fill="#2D3436" opacity="0.7">聚焦业务增长、客户留存与技术品牌壁垒</text>
  </g>
  
  <g id="content-cards">
    <g id="card-1">
      <rect x="100" y="200" width="500" height="220" fill="#FFFFFF" stroke="#FFE5D9" stroke-width="2" rx="16"/>
      <rect x="100" y="200" width="8" height="220" fill="#FF6B35" rx="4"/>
      <text x="140" y="265" font-family="sans-serif" font-size="32">🏢</text>
      <text x="185" y="255" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#2D3436">缩短产品到市场的距离</text>
      <text x="185" y="290" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#FF6B35">— 快速验证 PMF</text>
    </g>
    
    <g id="card-2">
      <rect x="680" y="200" width="500" height="220" fill="#FFFFFF" stroke="#FFE5D9" stroke-width="2" rx="16"/>
      <rect x="680" y="200" width="8" height="220" fill="#FF6B35" rx="4"/>
      <text x="720" y="265" font-family="sans-serif" font-size="32">📈</text>
      <text x="765" y="255" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#2D3436">提升客户成功率和续约率</text>
      <text x="765" y="290" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#FF6B35">数据驱动服务持续优化</text>
    </g>
    
    <g id="card-3">
      <rect x="100" y="460" width="500" height="220" fill="#FFFFFF" stroke="#FFE5D9" stroke-width="2" rx="16"/>
      <rect x="100" y="460" width="8" height="220" fill="#FF6B35" rx="4"/>
      <text x="140" y="525" font-family="sans-serif" font-size="32">💡</text>
      <text x="185" y="515" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#2D3436">驱动产品迭代</text>
      <text x="185" y="550" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#FF6B35">— 来自一线的真实需求是最佳 roadmap</text>
    </g>
    
    <g id="card-4">
      <rect x="680" y="460" width="500" height="220" fill="#FFFFFF" stroke="#FFE5D9" stroke-width="2" rx="16"/>
      <rect x="680" y="460" width="8" height="220" fill="#FF6B35" rx="4"/>
      <text x="720" y="525" font-family="sans-serif" font-size="32">🎯</text>
      <text x="765" y="515" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#2D3436">打造技术品牌</text>
      <text x="765" y="550" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#FF6B35">— 给客户「有人兜底」的安全感</text>
    </g>
  </g>
  
  <g id="connection-lines">
    <path d="M 600 310 L 680 310" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>
    <path d="M 600 570 L 680 570" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>
    <path d="M 350 420 L 350 460" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>
    <path d="M 930 420 L 930 460" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>
  </g>
  
  <g id="footer">
    <text x="1220" y="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#2D3436" opacity="0.5">8 / 9</text>
  </g>
</svg>