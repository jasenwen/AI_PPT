    <rect x="950" y="444" width="180" height="44" rx="10" fill="#FFFFFF" stroke="#FF8C42" stroke-width="2"/>
    <text x="1040" y="471" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#2D3436">📊 效果追踪</text>
