    <circle cx="1150" cy="180" r="90" fill="#FFA500" opacity="0.12"/>
    <circle cx="130" cy="620" r="110" fill="#FF8C42" opacity="0.1"/>
    <path d="M 0 0 Q 250 120 500 0" fill="none" stroke="#FF6B35" stroke-width="3" opacity="0.15"/>
    <path d="M 780 720 Q 900 600 1280 650" fill="none" stroke="#FF8C42" stroke-width="3" opacity="0.15"/>
    <circle cx="100" cy="50" r="4" fill="#FF6B35" opacity="0.6"/>
    <circle cx="1200" cy="650" r="6" fill="#FFA500" opacity="0.5"/>
  </g>
  
  <!-- Title Section -->
  <g id="title">
