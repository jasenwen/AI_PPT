    <circle cx="480" cy="280" r="6" fill="#FF6B35"/>
    <circle cx="760" cy="280" r="6" fill="#FF6B35"/>
    <circle cx="1040" cy="280" r="6" fill="#FF6B35"/>
  </g>
  
