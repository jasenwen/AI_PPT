<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <g id="background">
    <rect width="1280" height="720" fill="#FFF8F0"/>
    <rect x="0" y="0" width="1280" height="6" fill="#FF6B35"/>
    <rect x="0" y="0" width="6" height="720" fill="#FF6B35" opacity="0.8"/>
  </g>

  <g id="decorations">
    <circle cx="1150" cy="120" r="180" fill="#FFA500" opacity="0.08"/>
    <circle cx="150" cy="650" r="140" fill="#FF8C42" opacity="0.08"/>
    <circle cx="1050" cy="600" r="90" fill="#FF6B35" opacity="0.06"/>
    <circle cx="250" cy="150" r="40" fill="#FFA500" opacity="0.15"/>
    <polygon points="1180,250 1200,280 1160,280" fill="#FF8C42" opacity="0.2"/>
    <circle cx="100" cy="350" r="20" fill="#FF6B35" opacity="0.1"/>
    <circle cx="1200" cy="400" r="15" fill="#FFA500" opacity="0.12"/>
    <circle cx="180" cy="500" r="25" fill="#FF8C42" opacity="0.1"/>
  </g>

  <g id="header">
    <text x="100" y="110" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="#FF6B35" letter-spacing="1">FDE 必备技能图谱</text>
    <text x="100" y="150" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#2D3436" opacity="0.6">构建前线技术专家的核心能力矩阵</text>
  </g>

  <g id="central-node">
    <circle cx="640" cy="360" r="50" fill="#FF6B35"/>
    <text x="640" y="368" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FDE</text>
  </g>

  <g id="connections">
    <path d="M 640 360 Q 495 330 350 330" stroke="#FF6B35" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.5"/>
    <path d="M 640 360 Q 785 330 930 330" stroke="#FF6B35" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.5"/>
    <path d="M 640 360 Q 495 590 350 590" stroke="#FF6B35" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.5"/>
    <path d="M 640 360 Q 785 590 930 590" stroke="#FF6B35" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.5"/>
    <circle cx="350" cy="330" r="6" fill="#FF6B35"/>
    <circle cx="930" cy="330" r="6" fill="#FF6B35"/>
    <circle cx="350" cy="590" r="6" fill="#FF6B35"/>
    <circle cx="930" cy="590" r="6" fill="#FF6B35"/>
  </g>

  <g id="cards">
    <g id="card-1">
      <rect x="100" y="220" width="500" height="220" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
      <text x="140" y="265" font-size="32">💻</text>
      <text x="190" y="270" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D3436">技术硬实力</text>
      <text x="140" y="315" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#2D3436" opacity="0.8">全栈开发 · 系统集成 · DevOps</text>
    </g>

    <g id="card-2">
      <rect x="680" y="220" width="500" height="220" rx="16" fill="#FFFFFF" stroke="#FFA500" stroke-width="2"/>
      <text x="720" y="265" font-size="32">🤝</text>
      <text x="770" y="270" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D3436">业务洞察力</text>
      <text x="720" y="315" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#2D3436" opacity="0.8">行业知识 · 需求分析 · 方案设计</text>
    </g>

    <g id="card-3">
      <rect x="100" y="480" width="500" height="220" rx="16" fill="#FFFFFF" stroke="#FF8C42" stroke-width="2"/>
      <text x="140" y="525" font-size="32">🗣️</text>
      <text x="190" y="530" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D3436">沟通影响力</text>
      <text x="140" y="575" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#2D3436" opacity="0.8">客户对话 · 跨部门协作 · 技术汇报</text>
    </g>

    <g id="card-4">
      <rect x="680" y="480" width="500" height="220" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
      <text x="720" y="525" font-size="32">🧠</text>
      <text x="770" y="530" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D3436">快速学习力</text>
      <text x="720" y="575" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#2D3436" opacity="0.8">陌生领域快速上手 · 即战即用</text>
    </g>
  </g>

  <g id="footer">
    <line x1="100" y1="680" x2="1180" y2="680" stroke="#2D3436" stroke-width="1" opacity="0.1"/>
    <text x="1180" y="705" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#2D3436" opacity="0.4" text-anchor="end">5 / 9</text>
  </g>
</svg>