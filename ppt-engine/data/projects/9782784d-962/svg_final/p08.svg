    <g id="card-2">
      <path fill="#FFFFFF" stroke="#FFE5D9" stroke-width="2" d="M696,200 H1164 A16,16 0 0 1 1180,216 V404 A16,16 0 0 1 1164,420 H696 A16,16 0 0 1 680,404 V216 A16,16 0 0 1 696,200 Z" />
      <path fill="#FF6B35" d="M684,200 H684 A4,4 0 0 1 688,204 V416 A4,4 0 0 1 684,420 H684 A4,4 0 0 1 680,416 V204 A4,4 0 0 1 684,200 Z" />
