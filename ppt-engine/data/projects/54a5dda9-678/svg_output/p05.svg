<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- 纯白底色 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 顶部装饰线 -->
  <rect x="80" y="145" width="1120" height="1" fill="#E0E5EC"/>
  
  <!-- 标题区域 -->
  <g id="header">
    <text x="80" y="100" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#1A3A5C">关键技术深度解析</text>
    <text x="80" y="125" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">聚焦核心技术架构与业务赋能价值</text>
  </g>

  <!-- 卡片 1：知识表示学习 -->
  <g id="card-1">
    <rect x="80" y="180" width="520" height="220" rx="12" fill="#F5F7FA" stroke="#E0E5EC" stroke-width="1"/>
    <!-- 图标：节点网络 -->
    <g id="icon-1">
      <circle cx="110" cy="210" r="6" fill="#2B7FC3"/>
      <circle cx="130" cy="195" r="6" fill="#2B7FC3"/>
      <circle cx="130" cy="225" r="6" fill="#2B7FC3"/>
      <line x1="110" y1="210" x2="130" y2="195" stroke="#2B7FC3" stroke-width="2"/>
      <line x1="110" y1="210" x2="130" y2="225" stroke="#2B7FC3" stroke-width="2"/>
      <line x1="130" y1="195" x2="130" y2="225" stroke="#2B7FC3" stroke-width="2"/>
    </g>
    <!-- 标题 -->
    <text x="130" y="230" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">知识表示学习</text>
    <!-- 正文 -->
    <text x="130" y="265" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">
      <tspan x="130" dy="0">将非结构化业务数据转化为高维向量，</tspan>
      <tspan x="130" dy="24">支撑智能检索、个性化推荐与语义理解。</tspan>
    </text>
    <!-- 价值标签 -->
    <rect x="130" y="305" width="140" height="26" rx="13" fill="#2B7FC3" opacity="0.1"/>
    <text x="200" y="322" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2B7FC3" text-anchor="middle">业务价值：数据资产化</text>
  </g>

  <!-- 卡片 2：图神经网络 -->
  <g id="card-2">
    <rect x="680" y="180" width="520" height="220" rx="12" fill="#F5F7FA" stroke="#E0E5EC" stroke-width="1"/>
    <!-- 图标：分层连接 -->
    <g id="icon-2">
      <circle cx="110" cy="210" r="5" fill="#2B7FC3"/>
      <circle cx="125" cy="200" r="5" fill="#2B7FC3"/>
      <circle cx="125" cy="220" r="5" fill="#2B7FC3"/>
      <circle cx="140" cy="210" r="5" fill="#2B7FC3"/>
      <line x1="110" y1="210" x2="125" y2="200" stroke="#2B7FC3" stroke-width="1.5"/>
      <line x1="110" y1="210" x2="125" y2="220" stroke="#2B7FC3" stroke-width="1.5"/>
      <line x1="125" y1="200" x2="140" y2="210" stroke="#2B7FC3" stroke-width="1.5"/>
      <line x1="125" y1="220" x2="140" y2="210" stroke="#2B7FC3" stroke-width="1.5"/>
    </g>
    <text x="700" y="230" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">图神经网络</text>
    <text x="700" y="265" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">
      <tspan x="700" dy="0">基于GCN/GAT算法挖掘实体深层拓扑</tspan>
      <tspan x="700" dy="24">关联，精准识别欺诈网络与用户画像。</tspan>
    </text>
    <rect x="700" y="305" width="140" height="26" rx="13" fill="#2B7FC3" opacity="0.1"/>
    <text x="770" y="322" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2B7FC3" text-anchor="middle">业务价值：风险洞察</text>
  </g>

  <!-- 卡片 3：知识图谱补全 -->
  <g id="card-3">
    <rect x="80" y="440" width="520" height="220" rx="12" fill="#F5F7FA" stroke="#E0E5EC" stroke-width="1"/>
    <!-- 图标：拼图/链接 -->
    <g id="icon-3">
      <path d="M105,205 h10 v5 h5 v10 h-5 v5 h-10 v-5 h-5 v-10 h5 z" fill="none" stroke="#2B7FC3" stroke-width="2"/>
      <path d="M120,205 h10 v5 h5 v10 h-5 v5 h-10 v-5 h-5 v-10 h5 z" fill="none" stroke="#2B7FC3" stroke-width="2"/>
      <line x1="115" y1="210" x2="120" y2="210" stroke="#2B7FC3" stroke-width="2"/>
    </g>
    <text x="130" y="490" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">知识图谱补全</text>
    <text x="130" y="525" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">
      <tspan x="130" dy="0">利用链接预测自动推断缺失关系，</tspan>
      <tspan x="130" dy="24">修复数据断层，保障决策数据可靠性。</tspan>
    </text>
    <rect x="130" y="565" width="140" height="26" rx="13" fill="#2B7FC3" opacity="0.1"/>
    <text x="200" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2B7FC3" text-anchor="middle">业务价值：数据完整性</text>
  </g>

  <!-- 卡片 4：大模型融合 -->
  <g id="card-4">
    <rect x="680" y="440" width="520" height="220" rx="12" fill="#F5F7FA" stroke="#E0E5EC" stroke-width="1"/>
    <!-- 图标：大脑+云/数据 -->
    <g id="icon-4">
      <path d="M110,205 c-2,-5 5,-8 8,-3 c3,-5 10,-2 8,3 c5,2 2,9 -3,8 c-2,5 -9,2 -8,-3 c-5,-2 -2,-9 3,-8 z" fill="none" stroke="#2B7FC3" stroke-width="2"/>
      <path d="M125,215 l5,-5 l5,5 l-5,5 z" fill="#2B7FC3" opacity="0.3"/>
      <line x1="115" y1="215" x2="130" y2="215" stroke="#2B7FC3" stroke-width="2"/>
    </g>
    <text x="700" y="490" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">大模型融合</text>
    <text x="700" y="525" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">
      <tspan x="700" dy="0">RAG架构结合图谱事实约束，有效</tspan>
      <tspan x="700" dy="24">抑制AI“幻觉”，确保输出专业可溯源。</tspan>
    </text>
    <rect x="700" y="565" width="140" height="26" rx="13" fill="#2B7FC3" opacity="0.1"/>
    <text x="770" y="582" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2B7FC3" text-anchor="middle">业务价值：可信AI生成</text>
  </g>
</svg>