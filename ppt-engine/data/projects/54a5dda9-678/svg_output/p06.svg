<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <g id="header">
    <text x="140" y="85" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#1A3A5C">应用落地场景总览</text>
    <line x1="140" y1="110" x2="1140" y2="110" stroke="#F5F7FA" stroke-width="4"/>
    <text x="140" y="140" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">聚焦核心业务价值，驱动智能化决策与运营效率升级</text>
  </g>

  <g id="card-1">
    <rect x="140" y="170" width="480" height="140" rx="12" fill="#FFFFFF" stroke="#E8ECF0" stroke-width="1"/>
    <circle cx="180" cy="210" r="24" fill="#F5F7FA"/>
    <text x="180" y="216" font-family="sans-serif" font-size="24" text-anchor="middle">🔍</text>
    <text x="220" y="205" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">智能搜索</text>
    <text x="220" y="235" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">语义理解与实体卡片，精准匹配意图降低检索成本</text>
    <rect x="220" y="250" width="40" height="4" rx="2" fill="#2B7FC3"/>
  </g>

  <g id="card-2">
    <rect x="660" y="170" width="480" height="140" rx="12" fill="#FFFFFF" stroke="#E8ECF0" stroke-width="1"/>
    <circle cx="700" cy="210" r="24" fill="#F5F7FA"/>
    <text x="700" y="216" font-family="sans-serif" font-size="24" text-anchor="middle">💬</text>
    <text x="740" y="205" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">智能问答</text>
    <text x="740" y="235" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">自然语言交互直达权威答案，大幅提升决策效率</text>
    <rect x="740" y="250" width="40" height="4" rx="2" fill="#2B7FC3"/>
  </g>

  <g id="card-3">
    <rect x="140" y="340" width="480" height="140" rx="12" fill="#FFFFFF" stroke="#E8ECF0" stroke-width="1"/>
    <circle cx="180" cy="380" r="24" fill="#F5F7FA"/>
    <text x="180" y="386" font-family="sans-serif" font-size="24" text-anchor="middle">📈</text>
    <text x="220" y="375" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">推荐系统</text>
    <text x="220" y="405" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">基于关系网络优化分发策略，显著提升转化与留存</text>
    <rect x="220" y="420" width="40" height="4" rx="2" fill="#2B7FC3"/>
  </g>

  <g id="card-4">
    <rect x="660" y="340" width="480" height="140" rx="12" fill="#FFFFFF" stroke="#E8ECF0" stroke-width="1"/>
    <circle cx="700" cy="380" r="24" fill="#F5F7FA"/>
    <text x="700" y="386" font-family="sans-serif" font-size="24" text-anchor="middle">🛡</text>
    <text x="740" y="375" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">风险控制</text>
    <text x="740" y="405" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">实时识别隐蔽资金链路，有效拦截异常保障资产安全</text>
    <rect x="740" y="420" width="40" height="4" rx="2" fill="#2B7FC3"/>
  </g>

  <g id="card-5">
    <rect x="140" y="510" width="1000" height="140" rx="12" fill="#FFFFFF" stroke="#E8ECF0" stroke-width="1"/>
    <circle cx="180" cy="550" r="24" fill="#F5F7FA"/>
    <text x="180" y="556" font-family="sans-serif" font-size="24" text-anchor="middle">🏥</text>
    <text x="220" y="545" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">行业应用</text>
    <text x="220" y="575" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#333333">覆盖医疗、金融与法律领域，沉淀跨域知识资产赋能转型</text>
    <rect x="220" y="590" width="40" height="4" rx="2" fill="#2B7FC3"/>
  </g>

  <g id="footer">
    <text x="1180" y="690" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#999999" text-anchor="end">6 / 9</text>
  </g>
