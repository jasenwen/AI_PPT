<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="8" fill="#F5F7FA"/>
  <rect x="100" y="8" width="56" height="4" fill="#2B7FC3"/>

  <g id="title-section">
    <text x="100" y="115" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#1A3A5C">什么是知识图谱</text>
    <text x="100" y="155" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#333333">从数据孤岛到智能决策的核心基础设施</text>
  </g>

  <g id="card-definition">
    <rect x="100" y="200" width="1080" height="140" rx="12" fill="#F5F7FA"/>
    <rect x="100" y="200" width="6" height="140" fill="#2B7FC3" rx="3"/>
    <circle cx="160" cy="270" r="24" fill="#2B7FC3"/>
    <path d="M184 270 L215 245 M184 270 L215 295" stroke="#1A3A5C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="225" cy="245" r="15" fill="#1A3A5C"/>
    <circle cx="225" cy="295" r="15" fill="#1A3A5C"/>
    <text x="270" y="260" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1A3A5C">核心定义</text>
    <text x="270" y="295" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#333333">用图结构描述实体及其语义关系的知识库，突破传统表格存储局限。</text>
  </g>

  <g id="card-triple">
    <rect x="100" y="360" width="1080" height="140" rx="12" fill="#F5F7FA"/>
    <rect x="100" y="360" width="6" height="140" fill="#2B7FC3" rx="3"/>
    <circle cx="160" cy="430" r="18" fill="#2B7FC3"/>
    <line x1="178" y1="430" x2="196" y2="430" stroke="#1A3A5C" stroke-width="3" stroke-linecap="round"/>
    <circle cx="206" cy="430" r="18" fill="#1A3A5C"/>
    <line x1="224" y1="430" x2="242" y2="430" stroke="#1A3A5C" stroke-width="3" stroke-linecap="round"/>
    <circle cx="252" cy="430" r="18" fill="#2B7FC3"/>
    <text x="270" y="420" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1A3A5C">基本单元</text>
    <text x="270" y="455" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#333333"><tspan fill="#2B7FC3" font-weight="bold">&lt;实体, 关系, 实体&gt;</tspan> 三元组，精准刻画业务对象间的逻辑关联。</text>
  </g>

  <g id="card-essence">
    <rect x="100" y="520" width="1080" height="140" rx="12" fill="#F5F7FA"/>
    <rect x="100" y="520" width="6" height="140" fill="#2B7FC3" rx="3"/>
    <circle cx="160" cy="590" r="20" fill="#1A3A5C"/>
    <path d="M180 590 L200 565 M180 590 L200 615 M160 570 L180 550 M160 610 L180 630" stroke="#2B7FC3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="210" cy="565" r="12" fill="#2B7FC3"/>
    <circle cx="210" cy="615" r="12" fill="#2B7FC3"/>
    <circle cx="190" cy="550" r="12" fill="#2B7FC3"/>
    <circle cx="190" cy="630" r="12" fill="#2B7FC3"/>
    <text x="270" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1A3A5C">业务本质</text>
    <text x="270" y="615" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#333333">将碎片化信息组织成<tspan fill="#2B7FC3" font-weight="bold">结构化知识网络</tspan>，赋能智能搜索与决策分析。</text>
  </g>

  <text x="1180" y="695" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#999999" text-anchor="end">3 / 9</text>
</svg>