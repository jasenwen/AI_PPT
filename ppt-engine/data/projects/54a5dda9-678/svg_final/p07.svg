    <text x="720" y="205" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">医疗辅助诊断：症状-疾病-药物知识推理</text>
    <text x="720" y="235" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#333333">辅助医生快速定位病因，缩短诊疗路径，降低误诊风险</text>
  </g>
  
  
  <g id="case-financial-risk">
    <path fill="#F5F7FA" d="M92,380 H568 A12,12 0 0 1 580,392 V568 A12,12 0 0 1 568,580 H92 A12,12 0 0 1 80,568 V392 A12,12 0 0 1 92,380 Z" />
    <circle cx="120" cy="480" r="24" fill="#2B7FC3" />
    <text x="120" y="486" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="160" y="465" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">金融风控：企业关联关系挖掘与反团伙欺诈</text>
    <text x="160" y="495" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#333333">穿透复杂股权穿透网络，实时预警隐性关联交易，保障资金安全</text>
