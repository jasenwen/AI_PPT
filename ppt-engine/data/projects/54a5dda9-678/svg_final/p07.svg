  <g id="case-google-search">
    <path fill="#F5F7FA" d="M92,120 H568 A12,12 0 0 1 580,132 V308 A12,12 0 0 1 568,320 H92 A12,12 0 0 1 80,308 V132 A12,12 0 0 1 92,120 Z" />
    <circle cx="120" cy="220" r="24" fill="#2B7FC3" />
