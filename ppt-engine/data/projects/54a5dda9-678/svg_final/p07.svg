  <g id="case-llm-rag">
    <path fill="#F5F7FA" d="M652,380 H1128 A12,12 0 0 1 1140,392 V568 A12,12 0 0 1 1128,580 H652 A12,12 0 0 1 640,568 V392 A12,12 0 0 1 652,380 Z" />
    <circle cx="680" cy="480" r="24" fill="#2B7FC3" />
    <text x="680" y="486" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="720" y="465" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1A3A5C">大模型+RAG：利用知识图谱减少 LLM 幻觉</text>
    <text x="720" y="495" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#333333">为生成式AI提供权威事实锚点，显著提升回答可信度与业务可用性</text>
