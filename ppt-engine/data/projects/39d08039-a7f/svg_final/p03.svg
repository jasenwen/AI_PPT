<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC" />
  
  <g id="background-network">
    <line x1="920" y1="180" x2="1020" y2="240" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1020" y1="240" x2="1120" y2="190" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1020" y1="240" x2="1080" y2="340" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1080" y1="340" x2="980" y2="390" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="980" y1="390" x2="920" y2="180" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1120" y1="190" x2="1080" y2="340" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1080" y1="340" x2="1150" y2="280" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    <line x1="1150" y1="280" x2="1020" y2="240" stroke="#94A3B8" stroke-width="2" opacity="0.25" />
    
    <circle cx="920" cy="180" r="14" fill="#60A5FA" opacity="0.35" />
    <circle cx="1020" cy="240" r="18" fill="#3B82F6" opacity="0.45" />
    <circle cx="1120" cy="190" r="12" fill="#60A5FA" opacity="0.35" />
    <circle cx="1080" cy="340" r="16" fill="#3B82F6" opacity="0.45" />
    <circle cx="980" cy="390" r="13" fill="#60A5FA" opacity="0.35" />
    <circle cx="1150" cy="280" r="10" fill="#94A3B8" opacity="0.3" />
    <circle cx="1200" cy="350" r="8" fill="#94A3B8" opacity="0.25" />
    <circle cx="880" cy="420" r="9" fill="#94A3B8" opacity="0.25" />
  </g>

  <g id="header">
    <text x="80" y="105" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#0F172A">什么是知识图谱</text>
    <path fill="#2563EB" d="M83,125 H257 A3,3 0 0 1 260,128 V128 A3,3 0 0 1 257,131 H83 A3,3 0 0 1 80,128 V128 A3,3 0 0 1 83,125 Z" />
  </g>

  <g id="content-cards">
    <g id="card-1">
      <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M92,180 H1188 A12,12 0 0 1 1200,192 V288 A12,12 0 0 1 1188,300 H92 A12,12 0 0 1 80,288 V192 A12,12 0 0 1 92,180 Z" />
      <circle cx="140" cy="240" r="28" fill="#2563EB" />
      <text x="140" y="248" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
      <text x="195" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F172A">定义</text>
      <text x="195" y="268" font-family="Arial, sans-serif" font-size="20" fill="#475569">用图结构描述实体及其语义关系的知识库</text>
    </g>

    <g id="card-2">
      <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M92,320 H1188 A12,12 0 0 1 1200,332 V428 A12,12 0 0 1 1188,440 H92 A12,12 0 0 1 80,428 V332 A12,12 0 0 1 92,320 Z" />
      <circle cx="140" cy="380" r="28" fill="#2563EB" />
      <text x="140" y="388" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
      <text x="195" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F172A">基本单元</text>
      <text x="195" y="408" font-family="Arial, sans-serif" font-size="20" fill="#475569">&lt;实体, 关系, 实体&gt; 三元组</text>
    </g>

    <g id="card-3">
      <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M92,460 H1188 A12,12 0 0 1 1200,472 V568 A12,12 0 0 1 1188,580 H92 A12,12 0 0 1 80,568 V472 A12,12 0 0 1 92,460 Z" />
      <circle cx="140" cy="520" r="28" fill="#2563EB" />
      <text x="140" y="528" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
      <text x="195" y="510" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F172A">本质</text>
      <text x="195" y="548" font-family="Arial, sans-serif" font-size="20" fill="#475569">将碎片化信息组织成结构化知识网络</text>
    </g>
  </g>

  <g id="footer">
    <text x="1180" y="690" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-anchor="end">3 / 9</text>
  </g>
