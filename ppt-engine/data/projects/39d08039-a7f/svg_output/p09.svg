<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)" />

  <!-- Decorative Shapes -->
  <g id="decorations">
    <circle cx="1150" cy="50" r="350" fill="#ffffff" opacity="0.03" />
    <circle cx="100" cy="650" r="250" fill="#ffffff" opacity="0.02" />
    <path d="M0 620 L1280 620" stroke="#334155" stroke-width="2" opacity="0.6" />
  </g>

  <!-- Main Content Group -->
  <g id="content">
    <!-- Title -->
    <text x="640" y="280" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="120" fill="#ffffff" text-anchor="middle" font-weight="bold">谢谢！</text>
    
    <!-- English Subtitle -->
    <text x="640" y="350" font-family="Arial, sans-serif" font-size="30" fill="#94a3b8" text-anchor="middle" letter-spacing="8">THANK YOU</text>

    <!-- Decorative Line -->
    <rect x="540" y="410" width="200" height="4" fill="url(#accentGradient)" rx="2" />

    <!-- Q&A Section -->
    <text x="640" y="510" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">Q &amp; A</text>
    
    <!-- Invitation Text -->
    <text x="640" y="590" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="36" fill="#cbd5e1" text-anchor="middle">欢迎交流讨论</text>
  </g>
</svg>