<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1280" height="6" fill="#2563EB"/>
  
  <g id="header">
    <rect x="80" y="40" width="6" height="48" fill="#2563EB" rx="3"/>
    <text x="100" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" fill="#0F172A">应用落地场景总览</text>
    <text x="100" y="100" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#64748B">Knowledge Graph Application Scenarios</text>
    <line x1="80" y1="120" x2="1200" y2="120" stroke="#E2E8F0" stroke-width="2"/>
  </g>

  <g id="content-cards">
    <g id="card-1">
      <rect x="80" y="160" width="560" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="120" cy="215" r="32" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <text x="120" y="225" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" text-anchor="middle">🔍</text>
      <text x="170" y="200" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0F172A">智能搜索</text>
      <text x="170" y="228" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">语义理解与实体卡片（如 Google KG）</text>
    </g>

    <g id="card-2">
      <rect x="80" y="300" width="560" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="120" cy="355" r="32" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <text x="120" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" text-anchor="middle">💬</text>
      <text x="170" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0F172A">智能问答</text>
      <text x="170" y="368" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">KBQA 与对话系统</text>
    </g>

    <g id="card-3">
      <rect x="80" y="440" width="560" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="120" cy="495" r="32" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <text x="120" y="505" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" text-anchor="middle">📈</text>
      <text x="170" y="480" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0F172A">推荐系统</text>
      <text x="170" y="508" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">增强推荐的可解释性与精准度</text>
    </g>

    <g id="card-4">
      <rect x="680" y="160" width="560" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="740" cy="215" r="32" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <text x="740" y="225" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" text-anchor="middle">🛡</text>
      <text x="790" y="200" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0F172A">风险控制</text>
      <text x="790" y="228" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">关联挖掘与反欺诈检测</text>
    </g>

    <g id="card-5">
      <rect x="680" y="300" width="560" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="740" cy="355" r="32" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <text x="740" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" text-anchor="middle">🏥</text>
      <text x="790" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0F172A">行业应用</text>
      <text x="790" y="368" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569">医疗/金融/法律知识图谱</text>
    </g>
  </g>

  <g id="footer">
    <line x1="80" y1="680" x2="1100" y2="680" stroke="#E2E8F0" stroke-width="1"/>
    <text x="1180" y="680" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#94A3B8" text-anchor="end">6 / 9</text>
  </g>
</svg>