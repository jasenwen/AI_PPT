<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="640" cy="360" r="350" fill="url(#centerGlow)"/>
  <path d="M 0 0 L 180 0 L 180 24 L 24 24 L 24 180 L 0 180 Z" fill="#38BDF8" opacity="0.15"/>
  <path d="M 1280 720 L 1100 720 L 1100 696 L 1176 696 L 1176 620 L 1280 620 Z" fill="#38BDF8" opacity="0.15"/>
  
  <!-- Main Content -->
  <g id="ending-content">
    <!-- Title -->
    <text x="640" y="310" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">谢谢</text>
    
    <!-- Divider -->
    <line x1="540" y1="375" x2="740" y2="375" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="640" cy="375" r="8" fill="#38BDF8"/>
    <circle cx="540" cy="375" r="4" fill="#38BDF8"/>
    <circle cx="740" cy="375" r="4" fill="#38BDF8"/>
    
    <!-- Subtitle -->
    <text x="640" y="460" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="300" fill="#38BDF8" text-anchor="middle" letter-spacing="14">Q &amp; A</text>
    
    <!-- Helper Text -->
    <text x="640" y="530" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="normal" fill="#94A3B8" text-anchor="middle">Questions &amp; Answers</text>
  </g>
  
  <!-- Footer -->
  <g id="footer">
    <line x1="120" y1="660" x2="1160" y2="660" stroke="#334155" stroke-width="1"/>
    <text x="640" y="695" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Thank you for your attention</text>
  </g>
</svg>