<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0f1638"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2550"/>
      <stop offset="100%" style="stop-color:#111836"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1545"/>
      <stop offset="100%" style="stop-color:#141030"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2535"/>
      <stop offset="100%" style="stop-color:#0c1a28"/>
    </linearGradient>
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Grid pattern overlay -->
  <g id="grid-pattern" opacity="0.03">
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="720" x2="1280" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="213" y1="0" x2="213" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="426" y1="0" x2="426" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="853" y1="0" x2="853" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="1066" y1="0" x2="1066" y2="720" stroke="#fff" stroke-width="1"/>
    <line x1="1280" y1="0" x2="1280" y2="720" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="180" cy="650" r="100" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="640" cy="360" r="200" fill="#06b6d4" opacity="0.02"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#lineGrad1)"/>

  <!-- Page indicator -->
  <text x="1240" y="30" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4a5580" font-weight="normal">2 / 3</text>

  <!-- Title Section -->
  <g id="title-section">
    <text x="640" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#ffffff" font-weight="bold" letter-spacing="2">核 心 技 术 架 构</text>
    <text x="640" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6b7db3" letter-spacing="1">CORE TECHNICAL ARCHITECTURE</text>
    <line x1="540" y1="118" x2="740" y2="118" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <polygon points="635,114 645,114 640,122" fill="#3b82f6" opacity="0.8"/>
  </g>

  <!-- Central Hub Node -->
  <g id="central-hub" filter="url(#shadow)">
    <circle cx="640" cy="340" r="52" fill="#141b3d" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
    <circle cx="640" cy="340" r="44" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <!-- Brain/AI icon -->
    <g transform="translate(640,340)" filter="url(#glow1)">
      <circle cx="0" cy="-8" r="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <path d="M-12,-2 Q-16,4 -10,10 Q-6,14 0,12 Q6,14 10,10 Q16,4 12,-2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="0" y1="-18" x2="0" y2="-12" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="-14" y1="-6" x2="-10" y2="-2" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="14" y1="-6" x2="10" y2="-2" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="-16" y1="6" x2="-10" y2="10" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="16" y1="6" x2="10" y2="10" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="#3b82f6"/>
    </g>
    <text x="640" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7db3" font-weight="bold">AI 中枢引擎</text>
  </g>

  <!-- Connection Lines from Hub to Cards -->
  <g id="connections">
    <!-- Left connection -->
    <path d="M588,340 Q480,340 400,340" fill="none" stroke="url(#lineGrad1)" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <polygon points="400,335 410,340 400,345" fill="#3b82f6" opacity="0.8"/>
    <!-- Right connection -->
    <path d="M692,340 Q800,340 880,340" fill="none" stroke="url(#lineGrad2)" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <polygon points="880,335 890,340 880,345" fill="#06b6d4" opacity="0.8"/>
    <!-- Bottom connection -->
    <path d="M640,392 L640,460" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <polygon points="635,460 640,470 645,460" fill="#8b5cf6" opacity="0.8"/>
  </g>

  <!-- Card 1: LLM (Left) -->
  <g id="card-llm" filter="url(#shadow)">
    <rect x="120" y="200" width="320" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
    <!-- Top accent bar -->
    <rect x="120" y="200" width="320" height="4" rx="2" fill="#3b82f6"/>
    <!-- Icon area -->
    <g transform="translate(280,260)">
      <circle cx="0" cy="0" r="36" fill="#0d1530" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Neural network icon -->
      <g filter="url(#glow1)">
        <circle cx="-12" cy="-12" r="4" fill="#3b82f6"/>
        <circle cx="12" cy="-12" r="4" fill="#3b82f6"/>
        <circle cx="0" cy="0" r="5" fill="#3b82f6"/>
        <circle cx="-12" cy="12" r="4" fill="#3b82f6"/>
        <circle cx="12" cy="12" r="4" fill="#3b82f6"/>
        <line x1="-12" y1="-12" x2="0" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
        <line x1="12" y1="-12" x2="0" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
        <line x1="-12" y1="12" x2="0" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
        <line x1="12" y1="12" x2="0" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
        <line x1="-12" y1="-12" x2="12" y2="-12" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
        <line x1="-12" y1="12" x2="12" y2="12" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
      </g>
    </g>
    <!-- Title -->
    <text x="280" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">大语言模型</text>
    <text x="280" y="350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4a6fa5" letter-spacing="1">LLM</text>
    <!-- Description -->
    <text x="160" y="385" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 基于 Transformer 架构的预训练模型</text>
    <text x="160" y="408" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 支持自然语言理解与生成</text>
    <text x="160" y="431" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 具备上下文推理与知识迁移能力</text>
    <!-- Feature tags -->
    <rect x="160" y="455" width="72" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
    <text x="196" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6ba3f7">NLP</text>
    <rect x="240" y="455" width="72" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
    <text x="276" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6ba3f7">推理</text>
    <rect x="320" y="455" width="72" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
    <text x="356" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6ba3f7">生成</text>
  </g>

  <!-- Card 2: Knowledge Graph (Right) -->
  <g id="card-knowledge" filter="url(#shadow)">
    <rect x="840" y="200" width="320" height="280" rx="16" fill="url(#cardGrad2)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>
    <!-- Top accent bar -->
    <rect x="840" y="200" width="320" height="4" rx="2" fill="#8b5cf6"/>
    <!-- Icon area -->
    <g transform="translate(1000,260)">
      <circle cx="0" cy="0" r="36" fill="#120d28" stroke="#8b5cf6" stroke-width="1.5"/>
      <!-- Knowledge graph icon -->
      <g filter="url(#glow2)">
        <circle cx="-15" cy="-10" r="5" fill="#8b5cf6"/>
        <circle cx="15" cy="-10" r="5" fill="#8b5cf6"/>
        <circle cx="0" cy="10" r="6" fill="#8b5cf6"/>
        <circle cx="-15" cy="10" r="4" fill="#8b5cf6"/>
        <circle cx="15" cy="10" r="4" fill="#8b5cf6"/>
        <line x1="-15" y1="-10" x2="0" y2="10" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6"/>
        <line x1="15" y1="-10" x2="0" y2="10" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6"/>
        <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
        <line x1="-15" y1="10" x2="15" y2="10" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
        <line x1="-15" y1="-10" x2="-15" y2="10" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
        <line x1="15" y1="-10" x2="15" y2="10" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
      </g>
    </g>
    <!-- Title -->
    <text x="1000" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">知识图谱</text>
    <text x="1000" y="350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9b7fd4" letter-spacing="1">KNOWLEDGE GRAPH</text>
    <!-- Description -->
    <text x="860" y="385" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 结构化领域知识表示与存储</text>
    <text x="860" y="408" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 实体关系抽取与语义推理</text>
    <text x="860" y="431" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 支持动态更新与知识融合</text>
    <!-- Feature tags -->
    <rect x="860" y="455" width="72" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <text x="896" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#b08ff0">本体</text>
    <rect x="940" y="455" width="72" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <text x="976" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#b08ff0">推理</text>
    <rect x="1020" y="455" width="72" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <text x="1056" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#b08ff0">融合</text>
  </g>

  <!-- Card 3: Multimodal Perception (Bottom Center) -->
  <g id="card-multimodal" filter="url(#shadow)">
    <rect x="440" y="490" width="400" height="190" rx="16" fill="url(#cardGrad3)" stroke="#06b6d4" stroke-width="1.5" opacity="0.95"/>
    <!-- Top accent bar -->
    <rect x="440" y="490" width="400" height="4" rx="2" fill="#06b6d4"/>
    <!-- Icon area -->
    <g transform="translate(640,540)">
      <circle cx="0" cy="0" r="36" fill="#0a1520" stroke="#06b6d4" stroke-width="1.5"/>
      <!-- Eye/sensor icon -->
      <g filter="url(#glow3)">
        <ellipse cx="0" cy="0" rx="20" ry="12" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="6" fill="#06b6d4"/>
        <circle cx="0" cy="0" r="2.5" fill="#0a1520"/>
        <path d="M-20,0 Q-28,-15 -20,-20" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
        <path d="M20,0 Q28,-15 20,-20" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
        <path d="M-20,0 Q-28,15 -20,20" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
        <path d="M20,0 Q28,15 20,20" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
        <!-- Signal waves -->
        <path d="M-26,-8 Q-30,-12 -26,-16" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.3"/>
        <path d="M26,-8 Q30,-12 26,-16" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.3"/>
      </g>
    </g>
    <!-- Title -->
    <text x="640" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">多模态感知</text>
    <text x="640" y="618" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5aa8c4" letter-spacing="1">MULTIMODAL PERCEPTION</text>
    <!-- Description -->
    <text x="470" y="645" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 视觉、语音、文本多源信息融合</text>
    <text x="470" y="665" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8899bb">• 跨模态对齐与联合表征学习</text>
    <!-- Feature tags -->
    <rect x="470" y="680" width="72" height="22" rx="11" fill="#06b6d4" opacity="0.15"/>
    <text x="506" y="695" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3e8">视觉</text>
    <rect x="550" y="680" width="72" height="22" rx="11" fill="#06b6d4" opacity="0.15"/>
    <text x="586" y="695" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3e8">语音</text>
    <rect x="630" y="680" width="72" height="22" rx="11" fill="#06b6d4" opacity="0.15"/>
    <text x="666" y="695" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3e8">文本</text>
    <rect x="710" y="680" width="72" height="22" rx="11" fill="#06b6d4" opacity="0.15"/>
    <text x="746" y="695" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3e8">融合</text>
  </g>

  <!-- Data flow arrows on connections -->
  <g id="flow-arrows" opacity="0.6">
    <!-- Animated-style dots on paths -->
    <circle cx="490" cy="340" r="3" fill="#3b82f6"/>
    <circle cx="790" cy="340" r="3" fill="#06b6d4"/>
    <circle cx="640" cy="425" r="3" fill="#8b5cf6"/>
  </g>

  <!-- Bottom decorative line -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#lineGrad2)" opacity="0.5"/>

  <!-- Corner decorations -->
  <g id="corner-decorations" opacity="0.3">
    <polyline points="30,30 50,30 50,50" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <polyline points="1250,30 1230,30 1230,50" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <polyline points="30,690 50,690 50,670" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <polyline points="1250,690 1230,690 1230,670" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
</svg>