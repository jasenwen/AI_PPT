<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#0B1120" />
  <circle cx="1100" cy="100" r="300" fill="#1E293B" opacity="0.4" />
  <circle cx="200" cy="600" r="250" fill="#1E293B" opacity="0.3" />

  <g id="title-group">
    <text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF">关键结论</text>
    <path fill="url(#accent1)" d="M62,115 H178 A2,2 0 0 1 180,117 V117 A2,2 0 0 1 178,119 H62 A2,2 0 0 1 60,117 V117 A2,2 0 0 1 62,115 Z" />
  </g>

  <g id="card-1" filter="url(#shadow)">
    <path fill="#1E293B" stroke="#334155" stroke-width="1" d="M76,190 H364 A16,16 0 0 1 380,206 V554 A16,16 0 0 1 364,570 H76 A16,16 0 0 1 60,554 V206 A16,16 0 0 1 76,190 Z" />
    <path fill="url(#accent1)" d="M63,190 H377 A3,3 0 0 1 380,193 V193 A3,3 0 0 1 377,196 H63 A3,3 0 0 1 60,193 V193 A3,3 0 0 1 63,190 Z" />
    <circle cx="100" cy="240" r="24" fill="#0EA5E9" opacity="0.15" />
    <text x="100" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#0EA5E9" text-anchor="middle">1</text>
    <text x="140" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">KG 与 RAG 互补</text>
    <line x1="140" y1="260" x2="340" y2="260" stroke="#334155" stroke-width="1" />
    <text x="140" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">知识图谱提供结构化推理能力，RAG 补充实时事实检索。</text>
    <text x="140" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">两者结合实现精准与灵活的平衡，显著提升问答可靠性。</text>
    <text x="140" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">适用于需要强逻辑约束与复杂关系推导的场景。</text>
  </g>

  <g id="card-2" filter="url(#shadow)">
    <path fill="#1E293B" stroke="#334155" stroke-width="1" d="M476,190 H764 A16,16 0 0 1 780,206 V554 A16,16 0 0 1 764,570 H476 A16,16 0 0 1 460,554 V206 A16,16 0 0 1 476,190 Z" />
    <path fill="url(#accent2)" d="M463,190 H777 A3,3 0 0 1 780,193 V193 A3,3 0 0 1 777,196 H463 A3,3 0 0 1 460,193 V193 A3,3 0 0 1 463,190 Z" />
    <circle cx="500" cy="240" r="24" fill="#8B5CF6" opacity="0.15" />
    <text x="500" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">2</text>
    <text x="540" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">GraphRAG 最佳实践</text>
    <line x1="540" y1="260" x2="740" y2="260" stroke="#334155" stroke-width="1" />
    <text x="540" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">采用社区检测优化索引构建，降低检索噪声。</text>
    <text x="540" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">利用图神经网络增强实体语义关联与上下文理解。</text>
    <text x="540" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">实施动态查询路由，平衡延迟与生成质量。</text>
  </g>

  <g id="card-3" filter="url(#shadow)">
    <path fill="#1E293B" stroke="#334155" stroke-width="1" d="M876,190 H1164 A16,16 0 0 1 1180,206 V554 A16,16 0 0 1 1164,570 H876 A16,16 0 0 1 860,554 V206 A16,16 0 0 1 876,190 Z" />
    <path fill="url(#accent3)" d="M863,190 H1177 A3,3 0 0 1 1180,193 V193 A3,3 0 0 1 1177,196 H863 A3,3 0 0 1 860,193 V193 A3,3 0 0 1 863,190 Z" />
    <circle cx="900" cy="240" r="24" fill="#10B981" opacity="0.15" />
    <text x="900" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">3</text>
    <text x="940" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">未来演进方向</text>
    <line x1="940" y1="260" x2="1140" y2="260" stroke="#334155" stroke-width="1" />
    <text x="940" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">向多模态图谱扩展，融合文本、图像与代码结构。</text>
    <text x="940" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">探索大模型与符号推理的深度融合架构。</text>
    <text x="940" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" fill="#CBD5E1">构建自动化知识演化与自监督持续更新机制。</text>
  </g>

  <g id="footer">
    <text x="1220" y="680" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="normal" fill="#64748B" text-anchor="end">12 / 13</text>
  </g>
</svg>