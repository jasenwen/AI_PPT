<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <ellipse cx="640" cy="360" rx="500" ry="250" fill="url(#centerGlow)"/>
  </g>
  <g id="decorations">
    <circle cx="180" cy="160" r="45" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.25"/>
    <circle cx="240" cy="220" r="20" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.25"/>
    <line x1="180" y1="160" x2="240" y2="220" stroke="#6366F1" stroke-width="2" opacity="0.25"/>
    <circle cx="1100" cy="540" r="55" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.25"/>
    <circle cx="1040" cy="480" r="25" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.25"/>
    <line x1="1100" y1="540" x2="1040" y2="480" stroke="#06B6D4" stroke-width="2" opacity="0.25"/>
    <path d="M 150 400 L 180 380 L 210 410 L 240 390" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.2"/>
    <path d="M 1040 320 L 1070 300 L 1100 330 L 1130 310" fill="none" stroke="#818CF8" stroke-width="1.5" opacity="0.2"/>
  </g>
  <g id="title-section">
    <text x="640" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">知识图谱 vs RAG</text>
    <line x1="520" y1="350" x2="760" y2="350" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round"/>
    <text x="640" y="415" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="normal" fill="#94A3B8" text-anchor="middle">大模型时代下两种知识增强范式的深度对比</text>
    <text x="640" y="475" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500" fill="#38BDF8" text-anchor="middle">面向技术团队</text>
  </g>
  <g id="footer">
    <text x="640" y="660" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="normal" fill="#64748B" text-anchor="middle">1 / 13</text>
  </g>
</svg>