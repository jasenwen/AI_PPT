<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC" />
  
  <g id="header">
    <text x="640" y="90" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#0F172A" text-anchor="middle">RAG 核心原理</text>
    <line x1="540" y1="115" x2="740" y2="115" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" />
  </g>

  <g id="card-index">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M136,160 H424 A16,16 0 0 1 440,176 V524 A16,16 0 0 1 424,540 H136 A16,16 0 0 1 120,524 V176 A16,16 0 0 1 136,160 Z" />
    <circle cx="280" cy="210" r="24" fill="#3B82F6" />
    <text x="280" y="218" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="280" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">三段式架构</text>
    <text x="280" y="295" font-family="Arial, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Index - Retrieve - Generate</text>
    <line x1="180" y1="320" x2="380" y2="320" stroke="#E2E8F0" stroke-width="1" />
    <text x="280" y="360" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">数据分块 → 向量化存储 → 统一索引管理</text>
  </g>

  <g id="card-retrieve">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M496,160 H784 A16,16 0 0 1 800,176 V524 A16,16 0 0 1 784,540 H496 A16,16 0 0 1 480,524 V176 A16,16 0 0 1 496,160 Z" />
    <circle cx="640" cy="210" r="24" fill="#8B5CF6" />
    <text x="640" y="218" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="640" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">向量化与语义检索</text>
    <text x="640" y="295" font-family="Arial, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Vector Embedding &amp; Semantic Search</text>
    <line x1="540" y1="320" x2="740" y2="320" stroke="#E2E8F0" stroke-width="1" />
    <text x="640" y="360" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">高维空间匹配 → 精准召回相关片段</text>
  </g>

  <g id="card-generate">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M856,160 H1144 A16,16 0 0 1 1160,176 V524 A16,16 0 0 1 1144,540 H856 A16,16 0 0 1 840,524 V176 A16,16 0 0 1 856,160 Z" />
    <circle cx="1000" cy="210" r="24" fill="#10B981" />
    <text x="1000" y="218" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="1000" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">灵活、实时、低成本</text>
    <text x="1000" y="295" font-family="Arial, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">Agile, Real-time &amp; Cost-effective</text>
    <line x1="900" y1="320" x2="1100" y2="320" stroke="#E2E8F0" stroke-width="1" />
    <text x="1000" y="360" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">动态注入上下文 → 免训练快速响应</text>
  </g>

  <g id="footer">
    <line x1="120" y1="680" x2="1160" y2="680" stroke="#E2E8F0" stroke-width="1" />
    <text x="1200" y="705" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-anchor="end">6 / 13</text>
  </g>
</svg>