<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <g id="background">
    <rect width="1280" height="720" fill="#0B1120"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bg-gradient)" opacity="0.4"/>
    <defs>
      <radialGradient id="bg-gradient" cx="50%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#1E293B"/>
        <stop offset="100%" stop-color="#0B1120"/>
      </radialGradient>
    </defs>
  </g>

  <g id="header">
    <text x="1180" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748B" text-anchor="end">3 / 13</text>
    <text x="640" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="bold" fill="#F1F5F9" text-anchor="middle">大模型的知识困境</text>
    <line x1="560" y1="140" x2="720" y2="140" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="content-cards">
    <g id="card-hallucination">
      <rect x="100" y="175" width="520" height="240" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <circle cx="140" cy="215" r="26" fill="#3B82F6"/>
      <text x="140" y="223" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">01</text>
      <text x="180" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">幻觉问题</text>
      <text x="180" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">模型生成看似合理但事实错误或逻辑矛盾的内容，</text>
      <text x="180" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">缺乏真实世界 grounding，易产生误导性输出。</text>
    </g>

    <g id="card-timeliness">
      <rect x="660" y="175" width="520" height="240" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <circle cx="700" cy="215" r="26" fill="#10B981"/>
      <text x="700" y="223" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">02</text>
      <text x="740" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">知识时效性</text>
      <text x="740" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">训练数据截止导致无法掌握最新事件与政策，</text>
      <text x="740" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">信息存在固有滞后，难以应对动态变化场景。</text>
    </g>

    <g id="card-domain">
      <rect x="100" y="455" width="520" height="240" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <circle cx="140" cy="500" r="26" fill="#F59E0B"/>
      <text x="140" y="508" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">03</text>
      <text x="180" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">领域专业性</text>
      <text x="180" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">通用模型难以替代垂直领域的深度知识体系，</text>
      <text x="180" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">在医疗、法律等高门槛场景易出现专业偏差。</text>
    </g>

    <g id="card-explainability">
      <rect x="660" y="455" width="520" height="240" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <circle cx="700" cy="500" r="26" fill="#EF4444"/>
      <text x="700" y="508" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">04</text>
      <text x="740" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">可解释性</text>
      <text x="740" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">黑盒特性导致决策过程不透明，难以追溯推理</text>
      <text x="740" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94A3B8">路径，影响高可靠性与合规性场景的实际落地。</text>
    </g>
  </g>
</svg>