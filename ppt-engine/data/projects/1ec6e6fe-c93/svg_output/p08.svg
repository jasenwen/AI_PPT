<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  
  <g id="header">
    <rect width="1280" height="100" fill="#0F172A"/>
    <line x1="0" y1="100" x2="1280" y2="100" stroke="#3B82F6" stroke-width="4"/>
    <text x="60" y="65" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">知识表示方式对比</text>
    <text x="1220" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#94A3B8" text-anchor="end">8 / 13</text>
  </g>

  <g id="content">
    <g id="card-kg">
      <rect x="60" y="140" width="360" height="520" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="60" y="140" width="360" height="6" rx="3" fill="#3B82F6"/>
      
      <circle cx="240" cy="230" r="48" fill="#EFF6FF"/>
      <g transform="translate(240, 230)">
        <circle cx="-22" cy="-16" r="7" fill="#3B82F6"/>
        <circle cx="22" cy="-16" r="7" fill="#3B82F6"/>
        <circle cx="0" cy="22" r="7" fill="#3B82F6"/>
        <line x1="-22" y1="-16" x2="22" y2="-16" stroke="#3B82F6" stroke-width="2.5"/>
        <line x1="-22" y1="-16" x2="0" y2="22" stroke="#3B82F6" stroke-width="2.5"/>
        <line x1="22" y1="-16" x2="0" y2="22" stroke="#3B82F6" stroke-width="2.5"/>
      </g>
      
      <text x="240" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0F172A" text-anchor="middle">知识图谱</text>
      <text x="240" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748B" text-anchor="middle">显式符号化</text>
      
      <text x="100" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 结构化三元组 (实体-关系-实体)</text>
      <text x="100" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 强逻辑推理与完全可解释性</text>
      <text x="100" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 依赖领域专家构建与维护</text>
    </g>

    <g id="card-rag">
      <rect x="460" y="140" width="360" height="520" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="460" y="140" width="360" height="6" rx="3" fill="#8B5CF6"/>
      
      <circle cx="640" cy="230" r="48" fill="#F5F3FF"/>
      <g transform="translate(640, 230)">
        <circle cx="0" cy="0" r="20" fill="none" stroke="#8B5CF6" stroke-width="2"/>
        <circle cx="-14" cy="-14" r="5" fill="#8B5CF6"/>
        <circle cx="14" cy="-14" r="5" fill="#8B5CF6"/>
        <circle cx="0" cy="18" r="5" fill="#8B5CF6"/>
        <path d="M-14,-14 Q0,0 14,-14" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
        <path d="M-14,-14 Q-7,6 0,18" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
        <path d="M14,-14 Q7,6 0,18" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
      </g>
      
      <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0F172A" text-anchor="middle">RAG</text>
      <text x="640" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748B" text-anchor="middle">隐式语义表示</text>
      
      <text x="500" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 高维向量空间连续嵌入</text>
      <text x="500" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 上下文感知与动态检索增强</text>
      <text x="500" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 数据驱动，具备黑盒特性</text>
    </g>

    <g id="card-vs">
      <rect x="860" y="140" width="360" height="520" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <rect x="860" y="140" width="360" height="6" rx="3" fill="#10B981"/>
      
      <circle cx="1040" cy="230" r="48" fill="#ECFDF5"/>
      <g transform="translate(1040, 230)">
        <path d="M-24,-12 L0,0 L-24,12" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24,-12 L0,0 L24,12" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="0" cy="0" r="5" fill="#10B981"/>
      </g>
      
      <text x="1040" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0F172A" text-anchor="middle">范式对比</text>
      <text x="1040" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748B" text-anchor="middle">符号主义 vs 连接主义</text>
      
      <text x="900" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 符号主义：离散逻辑、规则推导</text>
      <text x="900" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 连接主义：连续概率、神经网络</text>
      <text x="900" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#334155">• 演进趋势：神经符号融合架构</text>
    </g>
  </g>
</svg>