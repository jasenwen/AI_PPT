<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f5f8fe"/>
  
  <circle cx="1150" cy="120" r="180" fill="#4fc3f7" opacity="0.06"/>
  <circle cx="1200" cy="180" r="120" fill="#1a73e8" opacity="0.04"/>
  
  <text x="100" y="90" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1a73e8">RAG 技术栈</text>
  <rect x="100" y="105" width="50" height="4" rx="2" fill="#4fc3f7"/>
  
  <g id="card-1">
    <rect x="100" y="150" width="560" height="100" rx="10" fill="#ffffff" stroke="#e8f0fe" stroke-width="1"/>
    <rect x="100" y="150" width="6" height="100" rx="3" fill="#1a73e8"/>
    <circle cx="140" cy="185" r="16" fill="#1a73e8"/>
    <text x="140" y="190" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">1</text>
    <text x="170" y="185" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1a73e8">Embedding 模型</text>
    <text x="170" y="210" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555555">text-embedding-3 / BGE / E5</text>
  </g>
  
  <g id="card-2">
    <rect x="100" y="270" width="560" height="100" rx="10" fill="#ffffff" stroke="#e8f0fe" stroke-width="1"/>
    <rect x="100" y="270" width="6" height="100" rx="3" fill="#1a73e8"/>
    <circle cx="140" cy="305" r="16" fill="#1a73e8"/>
    <text x="140" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">2</text>
    <text x="170" y="305" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1a73e8">向量数据库</text>
    <text x="170" y="330" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555555">Milvus / Pinecone / Qdrant / Chroma</text>
  </g>
  
  <g id="card-3">
    <rect x="100" y="390" width="560" height="100" rx="10" fill="#ffffff" stroke="#e8f0fe" stroke-width="1"/>
    <rect x="100" y="390" width="6" height="100" rx="3" fill="#1a73e8"/>
    <circle cx="140" cy="425" r="16" fill="#1a73e8"/>
    <text x="140" y="430" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">3</text>
    <text x="170" y="425" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1a73e8">检索策略</text>
    <text x="170" y="450" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555555">Dense Retrieval + BM25 混合检索</text>
  </g>
  
  <g id="card-4">
    <rect x="700" y="270" width="560" height="100" rx="10" fill="#ffffff" stroke="#e8f0fe" stroke-width="1"/>
    <rect x="700" y="270" width="6" height="100" rx="3" fill="#4fc3f7"/>
    <circle cx="740" cy="305" r="16" fill="#4fc3f7"/>
    <text x="740" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">4</text>
    <text x="770" y="305" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1a73e8">优化技术</text>
    <text x="770" y="330" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555555">RAPTOR / HyDE / Self-RAG / CRAG</text>
  </g>
  
  <g id="card-5">
    <rect x="700" y="390" width="560" height="100" rx="10" fill="#ffffff" stroke="#e8f0fe" stroke-width="1"/>
    <rect x="700" y="390" width="6" height="100" rx="3" fill="#4fc3f7"/>
    <circle cx="740" cy="425" r="16" fill="#4fc3f7"/>
    <text x="740" y="430" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">5</text>
    <text x="770" y="425" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1a73e8">框架</text>
    <text x="770" y="450" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555555">LangChain / LlamaIndex / Haystack</text>
  </g>
  
  <line x1="100" y1="680" x2="1180" y2="680" stroke="#e0e7ff" stroke-width="1"/>
  <text x="1180" y="705" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#999999" text-anchor="end">10 / 21</text>
