<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f5f8fe"/>
  
  <g id="header">
    <text x="80" y="85" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1a73e8">知识图谱（KG）核心原理</text>
    <line x1="80" y1="110" x2="220" y2="110" stroke="#4fc3f7" stroke-width="5" stroke-linecap="round"/>
    <text x="80" y="145" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Knowledge Graph Core Principles</text>
  </g>

  <g id="left-column">
    <g id="card-1">
      <rect x="80" y="170" width="520" height="130" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
      <circle cx="115" cy="205" r="18" fill="#1a73e8"/>
      <text x="115" y="210" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
      <text x="145" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a73e8">结构化三元组</text>
      <text x="145" y="235" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">基于 实体-关系-实体 三元组的结构化知识库</text>
    </g>

    <g id="card-2">
      <rect x="80" y="320" width="520" height="130" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
      <circle cx="115" cy="355" r="18" fill="#1a73e8"/>
      <text x="115" y="360" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
      <text x="145" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a73e8">Schema 先行</text>
      <text x="145" y="385" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">预定义本体（Ontology）约束语义</text>
    </g>

    <g id="card-3">
      <rect x="80" y="470" width="520" height="130" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
      <circle cx="115" cy="505" r="18" fill="#1a73e8"/>
      <text x="115" y="510" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
      <text x="145" y="505" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a73e8">推理机制</text>
      <text x="145" y="535" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">路径推理、规则推理、图算法（如 PageRank）</text>
    </g>
  </g>

  <g id="right-column">
    <g id="card-4">
      <rect x="680" y="170" width="520" height="130" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
      <circle cx="715" cy="205" r="18" fill="#4fc3f7"/>
      <text x="715" y="210" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
      <text x="745" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a73e8">典型代表</text>
      <text x="745" y="235" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">Google Knowledge Graph、Wikidata</text>
    </g>

    <g id="card-5">
      <rect x="680" y="320" width="520" height="130" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
      <circle cx="715" cy="355" r="18" fill="#4fc3f7"/>
      <text x="715" y="360" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
      <text x="745" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a73e8">核心特点</text>
      <text x="745" y="385" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">高精度、可解释、但构建成本高</text>
    </g>
  </g>

  <g id="decorative-network" opacity="0.12">
    <line x1="400" y1="220" x2="600" y2="280" stroke="#1a73e8" stroke-width="2"/>
    <line x1="600" y1="280" x2="800" y2="220" stroke="#1a73e8" stroke-width="2"/>
    <line x1="600" y1="280" x2="600" y2="480" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="400" y1="220" x2="400" y2="420" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="800" y1="220" x2="800" y2="420" stroke="#1a73e8" stroke-width="2"/>
    <line x1="400" y1="420" x2="600" y2="480" stroke="#1a73e8" stroke-width="2"/>
    <line x1="800" y1="420" x2="600" y2="480" stroke="#4fc3f7" stroke-width="2"/>
    <circle cx="400" cy="220" r="9" fill="#1a73e8"/>
    <circle cx="600" cy="280" r="12" fill="#4fc3f7"/>
    <circle cx="800" cy="220" r="9" fill="#1a73e8"/>
    <circle cx="400" cy="420" r="9" fill="#4fc3f7"/>
    <circle cx="800" cy="420" r="9" fill="#1a73e8"/>
    <circle cx="600" cy="480" r="12" fill="#1a73e8"/>
  </g>

  <g id="footer">
    <line x1="80" y1="680" x2="1200" y2="680" stroke="#e0e7ff" stroke-width="1"/>
    <rect x="80" y="690" width="40" height="4" rx="2" fill="#1a73e8"/>
    <text x="1200" y="705" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="end">6 / 21</text>
  </g>
</svg>