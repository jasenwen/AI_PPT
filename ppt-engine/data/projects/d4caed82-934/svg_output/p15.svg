<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#f5f8fe"/>
  
  <!-- Decorative Tech Elements -->
  <circle cx="1180" cy="80" r="120" fill="#4fc3f7" opacity="0.05"/>
  <circle cx="100" cy="650" r="80" fill="#1a73e8" opacity="0.03"/>
  <line x1="0" y1="140" x2="1280" y2="140" stroke="#e0e7ff" stroke-width="1"/>

  <!-- Header Section -->
  <g id="header">
    <text x="80" y="100" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#1a73e8">05 应用场景与选型指南</text>
    <line x1="80" y1="125" x2="320" y2="125" stroke="#4fc3f7" stroke-width="4"/>
    <text x="640" y="185" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="normal" fill="#333333" text-anchor="middle">什么场景选谁？</text>
  </g>

  <!-- Left Column: High Concurrency / Real-time -->
  <g id="left-column">
    <rect x="80" y="220" width="520" height="460" rx="16" fill="#ffffff" stroke="#e0e7ff" stroke-width="1"/>
    <rect x="80" y="220" width="520" height="60" fill="#1a73e8" rx="16"/>
    <text x="110" y="258" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">场景一：高并发 / 实时计算</text>
    
    <text x="110" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a73e8">适用场景：</text>
    <text x="110" y="340" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• 海量日志实时采集与分析</text>
    <text x="110" y="370" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• 金融交易高频撮合系统</text>
    <text x="110" y="400" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• IoT设备毫秒级指令下发</text>
    
    <text x="110" y="450" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a73e8">核心指标评估：</text>
    
    <!-- Table Structure -->
    <rect x="110" y="470" width="460" height="100" fill="#f5f8fe" rx="8"/>
    <line x1="110" y1="470" x2="570" y2="470" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="110" y1="500" x2="570" y2="500" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="110" y1="530" x2="570" y2="530" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="110" y1="560" x2="570" y2="560" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="300" y1="470" x2="300" y2="560" stroke="#e0e7ff" stroke-width="1"/>
    
    <text x="130" y="495" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">吞吐量 (TPS)</text>
    <text x="130" y="525" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">延迟 (ms)</text>
    <text x="130" y="555" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">扩展性</text>
    
    <text x="320" y="495" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★★★</text>
    <text x="320" y="525" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★★★</text>
    <text x="320" y="555" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★★☆</text>
  </g>

  <!-- Right Column: Complex Business / Data Analysis -->
  <g id="right-column">
    <rect x="680" y="220" width="520" height="460" rx="16" fill="#ffffff" stroke="#e0e7ff" stroke-width="1"/>
    <rect x="680" y="220" width="520" height="60" fill="#1a73e8" rx="16"/>
    <text x="710" y="258" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">场景二：复杂业务 / 数据分析</text>
    
    <text x="710" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a73e8">适用场景：</text>
    <text x="710" y="340" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• 电商订单全链路追踪</text>
    <text x="710" y="370" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• 用户画像与精准营销</text>
    <text x="710" y="400" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#333333">• 跨域数据仓库与报表</text>
    
    <text x="710" y="450" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a73e8">核心指标评估：</text>
    
    <!-- Table Structure -->
    <rect x="710" y="470" width="460" height="100" fill="#f5f8fe" rx="8"/>
    <line x1="710" y1="470" x2="1170" y2="470" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="710" y1="500" x2="1170" y2="500" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="710" y1="530" x2="1170" y2="530" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="710" y1="560" x2="1170" y2="560" stroke="#e0e7ff" stroke-width="1"/>
    <line x1="900" y1="470" x2="900" y2="560" stroke="#e0e7ff" stroke-width="1"/>
    
    <text x="730" y="495" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">吞吐量 (TPS)</text>
    <text x="730" y="525" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">延迟 (ms)</text>
    <text x="730" y="555" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666666">扩展性</text>
    
    <text x="920" y="495" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★☆☆</text>
    <text x="920" y="525" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★★★</text>
    <text x="920" y="555" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">★★★★★</text>
  </g>

  <!-- Footer -->
  <g id="footer">
    <text x="1200" y="690" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#999999" text-anchor="end">15 / 21</text>
    <line x1="80" y1="680" x2="1200" y2="680" stroke="#e0e7ff" stroke-width="1"/>
  </g>
</svg>