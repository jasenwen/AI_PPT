<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <!-- Background -->
  <rect width="1280" height="720" fill="#f5f8fe"/>

  <!-- Header Section -->
  <g id="header">
    <text x="80" y="80" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#1a73e8">大模型的知识困境</text>
    <line x1="80" y1="100" x2="180" y2="100" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Dual-Column Content Cards -->
  <g id="content-grid">
    <!-- Card 1: 幻觉问题 -->
    <g id="card-1">
      <rect x="80" y="160" width="520" height="180" fill="#ffffff" rx="12"/>
      <rect x="80" y="180" width="4" height="40" fill="#1a73e8" rx="2"/>
      <text x="560" y="210" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#4fc3f7" opacity="0.2" text-anchor="end">01</text>
      <text x="110" y="215" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a73e8">幻觉问题</text>
      <text x="110" y="250" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555555">模型可能生成与事实不符的内容</text>
    </g>

    <!-- Card 2: 知识时效性 -->
    <g id="card-2">
      <rect x="640" y="160" width="520" height="180" fill="#ffffff" rx="12"/>
      <rect x="640" y="180" width="4" height="40" fill="#1a73e8" rx="2"/>
      <text x="1120" y="210" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#4fc3f7" opacity="0.2" text-anchor="end">02</text>
      <text x="670" y="215" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a73e8">知识时效性</text>
      <text x="670" y="250" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555555">训练数据截止后无法感知新信息</text>
    </g>

    <!-- Card 3: 领域专业性 -->
    <g id="card-3">
      <rect x="80" y="380" width="520" height="180" fill="#ffffff" rx="12"/>
      <rect x="80" y="400" width="4" height="40" fill="#1a73e8" rx="2"/>
      <text x="560" y="430" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#4fc3f7" opacity="0.2" text-anchor="end">03</text>
      <text x="110" y="435" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a73e8">领域专业性</text>
      <text x="110" y="470" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555555">通用模型在垂直领域表现不足</text>
    </g>

    <!-- Card 4: 可解释性 -->
    <g id="card-4">
      <rect x="640" y="380" width="520" height="180" fill="#ffffff" rx="12"/>
      <rect x="640" y="400" width="4" height="40" fill="#1a73e8" rx="2"/>
      <text x="1120" y="430" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#4fc3f7" opacity="0.2" text-anchor="end">04</text>
      <text x="670" y="435" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a73e8">可解释性</text>
      <text x="670" y="470" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555555">黑盒推理，难以追溯知识来源</text>
    </g>
  </g>

  <!-- Solution Banner -->
  <g id="solution-banner">
    <rect x="80" y="600" width="1120" height="80" fill="#1a73e8" rx="12"/>
    <text x="120" y="650" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">→ 两种主流解决方案：知识图谱 &amp; RAG</text>
    <path d="M 1180 640 L 1200 640 L 1200 630 L 1210 640 L 1200 650 L 1200 640 L 1180 640 Z" fill="#4fc3f7"/>
  </g>

  <!-- Page Indicator -->
  <g id="page-indicator">
    <text x="1200" y="700" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#999999" text-anchor="end">4 / 21</text>
  </g>
</svg>