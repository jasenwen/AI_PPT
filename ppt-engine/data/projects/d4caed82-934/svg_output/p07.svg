<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#f5f8fe"/>
  
  <g id="header">
    <text x="640" y="65" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1a73e8" text-anchor="middle">知识图谱技术栈</text>
    <line x1="520" y1="85" x2="760" y2="85" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="layer-storage">
    <rect x="140" y="120" width="1000" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="140" y="120" width="6" height="80" rx="3" fill="#1a73e8"/>
    <circle cx="200" cy="160" r="18" fill="#4fc3f7"/>
    <text x="200" y="166" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    <text x="240" y="154" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#111827">存储层 Storage Layer</text>
    <text x="240" y="178" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">Neo4j / NebulaGraph / JanusGraph（图数据库）</text>
  </g>

  <g id="layer-construction">
    <rect x="140" y="220" width="1000" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="140" y="220" width="6" height="80" rx="3" fill="#1a73e8"/>
    <circle cx="200" cy="260" r="18" fill="#4fc3f7"/>
    <text x="200" y="266" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">2</text>
    <text x="240" y="254" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#111827">构建层 Construction Layer</text>
    <text x="240" y="278" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">NLP 实体抽取 + 关系抽取 + 知识融合</text>
  </g>

  <g id="layer-query">
    <rect x="140" y="320" width="1000" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="140" y="320" width="6" height="80" rx="3" fill="#1a73e8"/>
    <circle cx="200" cy="360" r="18" fill="#4fc3f7"/>
    <text x="200" y="366" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">3</text>
    <text x="240" y="354" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#111827">查询层 Query Layer</text>
    <text x="240" y="378" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">SPARQL / Cypher / Gremlin</text>
  </g>

  <g id="layer-reasoning">
    <rect x="140" y="420" width="1000" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="140" y="420" width="6" height="80" rx="3" fill="#1a73e8"/>
    <circle cx="200" cy="460" r="18" fill="#4fc3f7"/>
    <text x="200" y="466" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">4</text>
    <text x="240" y="454" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#111827">推理层 Reasoning Layer</text>
    <text x="240" y="478" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">规则引擎 / GNN / 符号推理</text>
  </g>

  <g id="layer-llm">
    <rect x="140" y="520" width="1000" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="140" y="520" width="6" height="80" rx="3" fill="#1a73e8"/>
    <circle cx="200" cy="560" r="18" fill="#4fc3f7"/>
    <text x="200" y="566" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">5</text>
    <text x="240" y="554" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#111827">与 LLM 结合 KG-LLM Integration</text>
    <text x="240" y="578" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">KG-LLM 双向增强</text>
  </g>

  <g id="connectors">
    <line x1="143" y1="200" x2="143" y2="600" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
    <circle cx="143" cy="200" r="3" fill="#4fc3f7"/>
    <circle cx="143" cy="300" r="3" fill="#4fc3f7"/>
    <circle cx="143" cy="400" r="3" fill="#4fc3f7"/>
    <circle cx="143" cy="500" r="3" fill="#4fc3f7"/>
  </g>

  <g id="decorations">
    <path d="M 1160 120 L 1200 120 L 1200 160" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
    <circle cx="1200" cy="160" r="4" fill="#1a73e8" opacity="0.5"/>
    <path d="M 120 600 L 160 600 L 160 560" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>
    <circle cx="160" cy="560" r="4" fill="#1a73e8" opacity="0.5"/>
    <polygon points="1180,620 1190,640 1170,640" fill="#4fc3f7" opacity="0.3"/>
    <polygon points="100,100 110,120 90,120" fill="#1a73e8" opacity="0.2"/>
  </g>
</svg>