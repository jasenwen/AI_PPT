<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="450" fill="url(#centerGlow)"/>

  <!-- Tech Decorative Elements -->
  <g id="tech-decorations" opacity="0.7">
    <!-- Left network lines -->
    <path d="M 100 220 L 240 280 L 290 200" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="100" cy="220" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="240" cy="280" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="290" cy="200" r="2" fill="#00d4ff" opacity="0.4"/>
    
    <!-- Right network lines -->
    <path d="M 1180 500 L 1040 440 L 990 520" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="1180" cy="500" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="1040" cy="440" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="990" cy="520" r="2" fill="#00d4ff" opacity="0.4"/>

    <!-- Top/Bottom dashed arcs -->
    <path d="M 380 90 Q 640 130 900 90" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6 6"/>
    <path d="M 380 630 Q 640 590 900 630" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6 6"/>
    
    <!-- Corner brackets -->
    <path d="M 60 100 L 60 60 L 100 60" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
    <path d="M 1220 100 L 1220 60 L 1180 60" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
    <path d="M 60 620 L 60 660 L 100 660" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
    <path d="M 1220 620 L 1220 660 L 1180 660" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
  </g>

  <!-- Main Content -->
  <g id="main-content">
    <!-- Top accent line -->
    <line x1="520" y1="230" x2="760" y2="230" stroke="#00d4ff" stroke-width="2" filter="url(#cyanGlow)" opacity="0.8"/>
    
    <!-- Title -->
    <text x="640" y="305" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="6" filter="url(#cyanGlow)">谢谢！Q&amp;A</text>
    
    <!-- Bottom accent line -->
    <line x1="550" y1="345" x2="730" y2="345" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Content Point 1 -->
    <text x="640" y="415" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="normal" fill="#ffffff" text-anchor="middle" letter-spacing="3">欢迎交流与探讨</text>
    
    <!-- Content Point 2 -->
    <text x="640" y="465" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" fill="#8e9eab" text-anchor="middle" letter-spacing="1">知识图谱 / RAG / GraphRAG 技术选型咨询</text>
    
    <!-- Decorative indicator dots -->
    <circle cx="615" cy="505" r="3" fill="#00d4ff" opacity="0.5"/>
    <circle cx="640" cy="505" r="4" fill="#00d4ff" opacity="0.9" filter="url(#cyanGlow)"/>
    <circle cx="665" cy="505" r="3" fill="#00d4ff" opacity="0.5"/>
  </g>

  <!-- Footer -->
  <g id="footer">
    <text x="640" y="685" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="normal" fill="#8e9eab" text-anchor="middle" letter-spacing="2" opacity="0.6">21 / 21</text>
  </g>
</svg>