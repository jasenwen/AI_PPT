<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g id="background">
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <line x1="0" y1="140" x2="1280" y2="140" stroke="#00d4ff" stroke-width="1" opacity="0.06"/>
    <line x1="0" y1="580" x2="1280" y2="580" stroke="#00d4ff" stroke-width="1" opacity="0.06"/>
    <line x1="180" y1="0" x2="180" y2="720" stroke="#00d4ff" stroke-width="1" opacity="0.04"/>
    <line x1="1100" y1="0" x2="1100" y2="720" stroke="#00d4ff" stroke-width="1" opacity="0.04"/>
    <circle cx="180" cy="140" r="3" fill="#00d4ff" opacity="0.3"/>
    <circle cx="1100" cy="580" r="3" fill="#00d4ff" opacity="0.3"/>
  </g>
  
  <g id="chapter-number">
    <text x="130" y="440" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="bold" fill="#00d4ff" opacity="0.1">01</text>
    <text x="130" y="440" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="bold" fill="#00d4ff" filter="url(#glow)" opacity="0.85">01</text>
  </g>
  
  <g id="chapter-title">
    <text x="460" y="310" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#ffffff">背景与问题</text>
    <line x1="460" y1="345" x2="640" y2="345" stroke="#00d4ff" stroke-width="3"/>
  </g>
  
  <g id="content-point">
    <rect x="460" y="390" width="6" height="32" fill="#00d4ff"/>
    <text x="482" y="418" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="normal" fill="#8e9eab">1. 大模型的核心困境</text>
  </g>
  
  <g id="bottom-decoration">
    <line x1="100" y1="640" x2="1180" y2="640" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="160" y1="640" x2="1120" y2="640" stroke="#00d4ff" stroke-width="1" stroke-dasharray="8,8" opacity="0.3"/>
    <circle cx="100" cy="640" r="5" fill="#00d4ff"/>
    <circle cx="1180" cy="640" r="5" fill="#00d4ff"/>
    <circle cx="640" cy="640" r="8" fill="#00d4ff" filter="url(#glow)"/>
    <text x="640" y="675" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" fill="#8e9eab" text-anchor="middle" letter-spacing="5">SLIDE 03 / 21</text>
  </g>
</svg>