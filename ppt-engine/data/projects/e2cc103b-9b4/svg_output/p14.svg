<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0f1923"/>
  
  <g id="tech-background">
    <line x1="0" y1="100" x2="1280" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="620" x2="1280" y2="620" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    <circle cx="640" cy="360" r="280" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="6 12" opacity="0.08"/>
    <circle cx="640" cy="360" r="200" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3 9" opacity="0.06"/>
  </g>

  <g id="title-area">
    <text x="80" y="75" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">🔹 核心能力对比表</text>
    <line x1="80" y1="95" x2="1200" y2="95" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  </g>

  <g id="comparison-table">
    <rect x="80" y="110" width="1120" height="50" fill="#1a2332" rx="6"/>
    <text x="230" y="135" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">评估维度</text>
    <text x="635" y="135" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">知识图谱</text>
    <text x="1040" y="135" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">RAG</text>

    <g id="row-1">
      <rect x="80" y="170" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="200" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">精确性</text>
      <text x="635" y="200" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐⭐</text>
      <text x="1040" y="200" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐</text>
      <line x1="80" y1="230" x2="1200" y2="230" stroke="#1a2332" stroke-width="1"/>
    </g>

    <g id="row-2">
      <rect x="80" y="240" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="270" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">召回率</text>
      <text x="635" y="270" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐</text>
      <text x="1040" y="270" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐</text>
      <line x1="80" y1="300" x2="1200" y2="300" stroke="#1a2332" stroke-width="1"/>
    </g>

    <g id="row-3">
      <rect x="80" y="310" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="340" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">构建成本</text>
      <text x="635" y="340" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐</text>
      <text x="1040" y="340" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐</text>
      <line x1="80" y1="370" x2="1200" y2="370" stroke="#1a2332" stroke-width="1"/>
    </g>

    <g id="row-4">
      <rect x="80" y="380" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="410" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">可解释性</text>
      <text x="635" y="410" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐⭐</text>
      <text x="1040" y="410" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐</text>
      <line x1="80" y1="440" x2="1200" y2="440" stroke="#1a2332" stroke-width="1"/>
    </g>

    <g id="row-5">
      <rect x="80" y="450" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="480" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">实时性</text>
      <text x="635" y="480" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐</text>
      <text x="1040" y="480" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐⭐</text>
      <line x1="80" y1="510" x2="1200" y2="510" stroke="#1a2332" stroke-width="1"/>
    </g>

    <g id="row-6">
      <rect x="80" y="520" width="1120" height="60" fill="#131c27" rx="4"/>
      <text x="230" y="550" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">扩展性</text>
      <text x="635" y="550" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8e9eab" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐</text>
      <text x="1040" y="550" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" dominant-baseline="middle">⭐⭐⭐⭐⭐</text>
      <line x1="80" y1="580" x2="1200" y2="580" stroke="#1a2332" stroke-width="1"/>
    </g>
  </g>

  <g id="footer">
    <line x1="80" y1="670" x2="1200" y2="670" stroke="#1a2332" stroke-width="1"/>
    <text x="1200" y="695" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8e9eab" text-anchor="end">14 / 21</text>
  </g>
</svg>