    <circle cx="640" cy="360" r="380" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.02"/>
    <polygon points="640,100 648,115 632,115" fill="#00d4ff" opacity="0.3"/>
    <polygon points="640,620 648,605 632,605" fill="#00d4ff" opacity="0.3"/>
  </g>
  
  <g id="chapter-label">
    <text x="640" y="150" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="normal" fill="#8e9eab" text-anchor="middle" letter-spacing="8">CHAPTER 06</text>
    <line x1="560" y1="170" x2="720" y2="170" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>
  
