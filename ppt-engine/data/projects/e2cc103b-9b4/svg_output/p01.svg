<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="tech-background">
    <path d="M0 360 L1280 360" stroke="url(#lineGrad)" stroke-width="1"/>
    <path d="M640 0 L640 720" stroke="url(#lineGrad)" stroke-width="1"/>
    <path d="M100 100 L250 250" stroke="#00d4ff" stroke-width="1" opacity="0.15" stroke-dasharray="6 4"/>
    <path d="M1180 620 L1030 470" stroke="#00d4ff" stroke-width="1" opacity="0.15" stroke-dasharray="6 4"/>
    <path d="M150 600 L300 450" stroke="#00d4ff" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
    <path d="M1130 120 L980 270" stroke="#00d4ff" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
    
    <circle cx="250" cy="250" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="1030" cy="470" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="300" cy="450" r="2" fill="#00d4ff" opacity="0.4"/>
    <circle cx="980" cy="270" r="2" fill="#00d4ff" opacity="0.4"/>
    
    <circle cx="200" cy="180" r="45" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.12"/>
    <circle cx="1080" cy="540" r="65" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.1"/>
    <circle cx="180" cy="560" r="30" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
    <circle cx="1100" cy="160" r="35" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
    
    <polygon points="120,300 140,280 160,300 140,320" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    <polygon points="1160,420 1180,400 1200,420 1180,440" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  </g>

  <g id="center-glow">
    <circle cx="640" cy="360" r="220" fill="#00d4ff" opacity="0.03"/>
    <circle cx="640" cy="360" r="160" fill="#00d4ff" opacity="0.05"/>
    <circle cx="640" cy="360" r="100" fill="#00d4ff" opacity="0.08"/>
  </g>

  <g id="text-content">
    <line x1="520" y1="270" x2="760" y2="270" stroke="url(#accentGrad)" stroke-width="2"/>
    <text x="640" y="350" font-family="PingFang SC, Microsoft YaHei, system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="6">知识图谱 vs RAG</text>
    <text x="640" y="430" font-family="PingFang SC, Microsoft YaHei, system-ui, -apple-system, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="2">大模型时代下两种知识增强范式的深度对比</text>
    <text x="640" y="490" font-family="PingFang SC, Microsoft YaHei, system-ui, -apple-system, sans-serif" font-size="20" fill="#8e9eab" text-anchor="middle" letter-spacing="1">面向技术团队</text>
    <line x1="560" y1="530" x2="720" y2="530" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  </g>

  <g id="corner-accents">
    <path d="M40 40 L110 40 L110 110" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <path d="M1240 40 L1170 40 L1170 110" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <path d="M40 680 L110 680 L110 610" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <path d="M1240 680 L1170 680 L1170 610" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <circle cx="40" cy="40" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="1240" cy="40" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="40" cy="680" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="1240" cy="680" r="3" fill="#00d4ff" opacity="0.6"/>
  </g>
</svg>