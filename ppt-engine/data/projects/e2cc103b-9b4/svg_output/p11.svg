<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bgGlow)"/>
  
  <g id="tech-grid" stroke="#00d4ff" stroke-width="1" opacity="0.04">
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>
  
  <g id="corner-brackets" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 80 140 L 80 80 L 140 80"/>
    <path d="M 1200 140 L 1200 80 L 1140 80"/>
    <path d="M 80 580 L 80 640 L 140 640"/>
    <path d="M 1200 580 L 1200 640 L 1140 640"/>
  </g>
  
  <g id="chapter-number">
    <text x="640" y="260" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="#00d4ff" text-anchor="middle" filter="url(#glow)" opacity="0.12">04</text>
    <text x="640" y="260" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="#ffffff" text-anchor="middle">04</text>
  </g>
  
  <g id="title-section">
    <text x="640" y="380" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">核心维度对比</text>
    <text x="640" y="460" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="normal" fill="#8e9eab" text-anchor="middle">知识图谱 vs RAG — 全面对决</text>
  </g>
  
  <g id="decorative-line">
    <line x1="420" y1="540" x2="860" y2="540" stroke="#00d4ff" stroke-width="3" filter="url(#glow)"/>
    <line x1="560" y1="540" x2="720" y2="540" stroke="#ffffff" stroke-width="2"/>
    <circle cx="420" cy="540" r="5" fill="#00d4ff" filter="url(#softGlow)"/>
    <circle cx="860" cy="540" r="5" fill="#00d4ff" filter="url(#softGlow)"/>
    <circle cx="640" cy="540" r="7" fill="#ffffff" filter="url(#softGlow)"/>
    <line x1="480" y1="540" x2="490" y2="540" stroke="#00d4ff" stroke-width="2"/>
    <line x1="790" y1="540" x2="800" y2="540" stroke="#00d4ff" stroke-width="2"/>
  </g>
</svg>