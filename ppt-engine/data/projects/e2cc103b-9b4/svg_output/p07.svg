<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#141e2b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#151d28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Tech Background Elements -->
  <g id="bg-tech-lines" opacity="0.12">
    <line x1="0" y1="720" x2="1280" y2="0" stroke="#00d4ff" stroke-width="1"/>
    <line x1="1280" y1="720" x2="0" y2="0" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1150" cy="180" r="280" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1150" cy="180" r="180" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1150" cy="180" r="80" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <path d="M 900 100 L 950 150 L 900 200 L 850 150 Z" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <path d="M 1050 400 L 1100 450 L 1050 500 L 1000 450 Z" fill="none" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- Left Title Area -->
  <g id="left-title-area">
    <text x="80" y="190" font-size="130" font-weight="bold" fill="#00d4ff" opacity="0.15" font-family="system-ui, -apple-system, sans-serif">07</text>
    <text x="80" y="230" font-size="13" fill="#8e9eab" letter-spacing="2" font-family="system-ui, -apple-system, sans-serif">SLIDE 07 / 21</text>
    <text x="80" y="290" font-size="44" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">知识图谱技术栈</text>
    <line x1="80" y1="320" x2="150" y2="320" stroke="#00d4ff" stroke-width="4"/>
    <text x="80" y="360" font-size="16" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">全链路架构解析与核心组件</text>
    
    <!-- Vertical Decorative Line -->
    <line x1="80" y1="380" x2="80" y2="650" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
    <circle cx="80" cy="650" r="4" fill="#00d4ff"/>
  </g>

  <!-- Right Content Area -->
  <g id="right-content-area">
    <!-- Card 1: Storage -->
    <g id="card-storage">
      <rect x="420" y="120" width="780" height="85" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>
      <rect x="420" y="120" width="6" height="85" rx="3" fill="#00d4ff"/>
      <text x="460" y="168" font-size="26" font-weight="bold" fill="#00d4ff" font-family="system-ui, -apple-system, sans-serif">01</text>
      <text x="510" y="155" font-size="20" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">存储层</text>
      <text x="510" y="180" font-size="15" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">Neo4j / NebulaGraph / JanusGraph（图数据库）</text>
    </g>

    <!-- Card 2: Construction -->
    <g id="card-build">
      <rect x="420" y="225" width="780" height="85" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>
      <rect x="420" y="225" width="6" height="85" rx="3" fill="#00d4ff"/>
      <text x="460" y="273" font-size="26" font-weight="bold" fill="#00d4ff" font-family="system-ui, -apple-system, sans-serif">02</text>
      <text x="510" y="260" font-size="20" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">构建层</text>
      <text x="510" y="285" font-size="15" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">NLP 实体抽取 + 关系抽取 + 知识融合</text>
    </g>

    <!-- Card 3: Query -->
    <g id="card-query">
      <rect x="420" y="330" width="780" height="85" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>
      <rect x="420" y="330" width="6" height="85" rx="3" fill="#00d4ff"/>
      <text x="460" y="378" font-size="26" font-weight="bold" fill="#00d4ff" font-family="system-ui, -apple-system, sans-serif">03</text>
      <text x="510" y="365" font-size="20" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">查询层</text>
      <text x="510" y="390" font-size="15" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">SPARQL / Cypher / Gremlin</text>
    </g>

    <!-- Card 4: Reasoning -->
    <g id="card-reasoning">
      <rect x="420" y="435" width="780" height="85" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>
      <rect x="420" y="435" width="6" height="85" rx="3" fill="#00d4ff"/>
      <text x="460" y="483" font-size="26" font-weight="bold" fill="#00d4ff" font-family="system-ui, -apple-system, sans-serif">04</text>
      <text x="510" y="470" font-size="20" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">推理层</text>
      <text x="510" y="495" font-size="15" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">规则引擎 / GNN / 符号推理</text>
    </g>

    <!-- Card 5: LLM Integration (Highlighted) -->
    <g id="card-llm">
      <rect x="420" y="540" width="780" height="85" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="2" opacity="0.98"/>
      <rect x="420" y="540" width="6" height="85" rx="3" fill="#00d4ff"/>
      <polygon points="455,582 470,567 485,582 470,597" fill="#00d4ff"/>
      <text x="505" y="570" font-size="20" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">与 LLM 结合</text>
      <text x="505" y="595" font-size="15" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">KG-LLM 双向增强：结构化知识引导生成，大模型反馈优化图谱</text>
    </g>
  </g>

  <!-- Bottom Navigation/Decor -->
  <g id="bottom-decor">
    <line x1="80" y1="680" x2="1200" y2="680" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
    <circle cx="80" cy="680" r="3" fill="#00d4ff"/>
    <circle cx="1200" cy="680" r="3" fill="#00d4ff"/>
    <text x="80" y="705" font-size="12" fill="#8e9eab" font-family="system-ui, -apple-system, sans-serif">© 2024 Knowledge Graph Architecture Series | Confidential</text>
  </g>
</svg>