<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g id="background">
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  </g>

  <g id="tech-accents">
    <circle cx="1120" cy="180" r="140" fill="none" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="2"/>
    <circle cx="1120" cy="180" r="90" fill="none" stroke="#00d4ff" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M 1060 180 L 1180 180 M 1120 120 L 1120 240" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="80" y="80" width="4" height="60" fill="#00d4ff" opacity="0.6"/>
    <rect x="80" y="150" width="4" height="20" fill="#00d4ff" opacity="0.3"/>
    <circle cx="100" cy="100" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="100" cy="160" r="2" fill="#00d4ff" opacity="0.5"/>
  </g>

  <g id="chapter-number">
    <text x="100" y="400" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="bold" fill="#00d4ff" filter="url(#glow)" opacity="0.9">07</text>
    <text x="100" y="400" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="bold" fill="#ffffff" opacity="0.05">07</text>
  </g>

  <g id="chapter-text">
    <text x="420" y="320" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="bold" fill="#ffffff" letter-spacing="2">总结与展望</text>
    <line x1="420" y1="365" x2="600" y2="365" stroke="#00d4ff" stroke-width="4" filter="url(#glow)"/>
    <text x="420" y="450" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="normal" fill="#8e9eab" letter-spacing="1">1. 关键结论</text>
  </g>

  <g id="bottom-decoration">
    <line x1="100" y1="660" x2="1180" y2="660" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
    <line x1="100" y1="660" x2="1180" y2="660" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
    <polygon points="100,660 115,654 115,666" fill="#00d4ff"/>
    <polygon points="1180,660 1165,654 1165,666" fill="#00d4ff"/>
    <rect x="630" y="656" width="20" height="8" fill="#00d4ff" filter="url(#glow)"/>
  </g>

  <g id="page-info">
    <text x="1200" y="685" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="normal" fill="#8e9eab" text-anchor="end">19 / 21</text>
    <line x1="1050" y1="680" x2="1180" y2="680" stroke="#8e9eab" stroke-width="1" stroke-opacity="0.3"/>
  </g>
</svg>