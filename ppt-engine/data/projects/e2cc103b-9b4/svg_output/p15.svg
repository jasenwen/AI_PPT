<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <radialGradient id="numGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="techGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#techGrid)"/>

  <!-- Ambient Glow -->
  <circle cx="280" cy="360" r="220" fill="url(#numGlow)"/>

  <!-- Tech Decorations -->
  <g id="tech-lines">
    <path d="M 160 140 L 260 140 L 300 180 L 420 180" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
    <circle cx="420" cy="180" r="3" fill="#00d4ff" opacity="0.6"/>
    <path d="M 1120 620 L 1020 620 L 980 580 L 860 580" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
    <circle cx="860" cy="580" r="3" fill="#00d4ff" opacity="0.6"/>
    <line x1="1100" y1="120" x2="1100" y2="260" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
    <line x1="1040" y1="190" x2="1160" y2="190" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
    <circle cx="1100" cy="190" r="5" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <circle cx="1100" cy="190" r="2" fill="#00d4ff" opacity="0.7"/>
  </g>

  <!-- Chapter Content -->
  <g id="chapter-main">
    <!-- Large Number -->
    <text x="160" y="400" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="bold" fill="#00d4ff" opacity="0.12">05</text>
    <text x="160" y="400" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="bold" fill="#00d4ff" filter="url(#glow)">05</text>

    <!-- Title -->
    <text x="160" y="520" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" fill="#ffffff">应用场景与选型指南</text>

    <!-- Subtitle -->
    <text x="160" y="580" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#8e9eab">什么场景选谁？</text>

    <!-- Bottom Decorative Line -->
    <line x1="160" y1="650" x2="1120" y2="650" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="160" y1="650" x2="1120" y2="650" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <circle cx="160" cy="650" r="6" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="1120" cy="650" r="6" fill="#00d4ff" filter="url(#glow)"/>
  </g>

  <!-- UI Corners & Meta -->
  <g id="ui-corners">
    <path d="M 40 40 L 90 40 M 40 40 L 40 90" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <path d="M 1240 680 L 1190 680 M 1240 680 L 1240 630" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <text x="40" y="30" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#8e9eab" letter-spacing="2">SLIDE 15 / 21</text>
    <text x="1240" y="30" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#8e9eab" letter-spacing="2" text-anchor="end">CHAPTER 05</text>
  </g>
</svg>