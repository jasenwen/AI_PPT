<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1280" height="720" fill="#0f1923"/>
  
  <g id="bg-grid" opacity="0.06">
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#00d4ff" stroke-width="1"/>
    <path d="M 1050 80 L 1250 80 L 1250 280 Z" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1150" cy="180" r="160" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="6 10"/>
  </g>
  
  <line x1="440" y1="40" x2="440" y2="680" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  
  <g id="left-panel">
    <text x="60" y="100" font-family="sans-serif" font-size="52" font-weight="bold" fill="#ffffff">GraphRAG</text>
    <text x="60" y="145" font-family="sans-serif" font-size="26" fill="#00d4ff">— 知识图谱 + RAG</text>
    <line x1="60" y1="170" x2="180" y2="170" stroke="#00d4ff" stroke-width="4" filter="url(#glow)"/>
    
    <g id="tech-nodes" transform="translate(60, 220)" filter="url(#glow)">
      <line x1="40" y1="40" x2="120" y2="80" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
      <line x1="120" y1="80" x2="60" y2="160" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
      <line x1="60" y1="160" x2="40" y2="40" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
      <line x1="120" y1="80" x2="180" y2="120" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
      <line x1="60" y1="160" x2="180" y2="120" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
      <circle cx="40" cy="40" r="8" fill="#00d4ff"/>
      <circle cx="120" cy="80" r="10" fill="#00d4ff"/>
      <circle cx="60" cy="160" r="8" fill="#00d4ff"/>
      <circle cx="180" cy="120" r="6" fill="#00d4ff"/>
    </g>
    
    <text x="60" y="480" font-family="sans-serif" font-size="16" fill="#8e9eab">Page 18 / 21</text>
  </g>
  
  <g id="right-panel">
    <g id="card-1">
      <rect x="460" y="160" width="760" height="70" rx="6" fill="#15202b" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="490" cy="195" r="16" fill="#00d4ff"/>
      <text x="490" y="200" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f1923" text-anchor="middle">01</text>
      <text x="530" y="195" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">微软 GraphRAG：自动构建知识图谱进行 RAG 增强</text>
    </g>
    
    <g id="card-2">
      <rect x="460" y="250" width="760" height="70" rx="6" fill="#15202b" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="490" cy="285" r="16" fill="#00d4ff"/>
      <text x="490" y="290" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f1923" text-anchor="middle">02</text>
      <text x="530" y="285" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">LightRAG：轻量级图结构实现高效检索</text>
    </g>
    
    <g id="card-3">
      <rect x="460" y="340" width="760" height="70" rx="6" fill="#15202b" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="490" cy="375" r="16" fill="#00d4ff"/>
      <text x="490" y="380" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f1923" text-anchor="middle">03</text>
      <text x="530" y="375" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">核心优势：社区检测 + 多 hop 推理 + 全局理解</text>
    </g>
    
    <g id="card-4">
      <rect x="460" y="430" width="760" height="70" rx="6" fill="#15202b" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="490" cy="465" r="16" fill="#00d4ff"/>
      <text x="490" y="470" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f1923" text-anchor="middle">04</text>
      <text x="530" y="465" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">解决 RAG 缺乏关系理解、KG 缺乏灵活性的问题</text>
    </g>
    
    <g id="card-5">
      <rect x="460" y="520" width="760" height="70" rx="6" fill="#15202b" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="490" cy="555" r="16" fill="#00d4ff"/>
      <text x="490" y="560" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f1923" text-anchor="middle">05</text>
      <text x="530" y="555" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">未来趋势：Agent + Graph + RAG 三位一体</text>
    </g>
  </g>
</svg>