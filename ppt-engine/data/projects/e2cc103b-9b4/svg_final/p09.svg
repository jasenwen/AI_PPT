<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#0f1923" stop-opacity="0" />
    </radialGradient>
  </defs>

  
  <rect width="1280" height="720" fill="#0f1923" />
  <rect width="1280" height="720" fill="url(#bgGlow)" />

  
  <g id="bg-grid" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100" />
    <line x1="0" y1="200" x2="1280" y2="200" />
    <line x1="0" y1="300" x2="1280" y2="300" />
    <line x1="0" y1="400" x2="1280" y2="400" />
    <line x1="0" y1="500" x2="1280" y2="500" />
    <line x1="0" y1="600" x2="1280" y2="600" />
    <line x1="0" y1="700" x2="1280" y2="700" />
    <line x1="200" y1="0" x2="200" y2="720" />
    <line x1="400" y1="0" x2="400" y2="720" />
    <line x1="600" y1="0" x2="600" y2="720" />
    <line x1="800" y1="0" x2="800" y2="720" />
    <line x1="1000" y1="0" x2="1000" y2="720" />
    <line x1="1200" y1="0" x2="1200" y2="720" />
  </g>

  
  <g id="header">
    <text x="80" y="90" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">RAG 核心原理</text>
    <text x="80" y="120" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#8e9eab">Slide 9 / 21</text>
    <line x1="80" y1="140" x2="180" y2="140" stroke="url(#accentLineGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  </g>

  
  <g id="connectors" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 4" opacity="0.4">
    <line x1="180" y1="260" x2="180" y2="280" />
    <line x1="180" y1="360" x2="180" y2="380" />
    <line x1="180" y1="460" x2="180" y2="480" />
    <line x1="180" y1="560" x2="180" y2="580" />
  </g>

  
  <g id="cards">
    
    <g id="card-1">
      <path fill="#1a2332" stroke="#00d4ff" stroke-opacity="0.2" d="M148,180 H1132 A8,8 0 0 1 1140,188 V252 A8,8 0 0 1 1132,260 H148 A8,8 0 0 1 140,252 V188 A8,8 0 0 1 148,180 Z" />
      <circle cx="180" cy="220" r="18" fill="#00d4ff" />
      <text x="180" y="225" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1923" text-anchor="middle">1</text>
      <text x="220" y="215" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">三段式架构</text>
      <text x="220" y="240" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">索引（Index） → 检索（Retrieve） → 生成（Generate）</text>
      <path d="M1020 220 L1050 220 L1040 210 M1050 220 L1040 230" stroke="#00d4ff" stroke-width="2" fill="none" />
    </g>

    
    <g id="card-2">
      <path fill="#1a2332" stroke="#00d4ff" stroke-opacity="0.2" d="M148,280 H1132 A8,8 0 0 1 1140,288 V352 A8,8 0 0 1 1132,360 H148 A8,8 0 0 1 140,352 V288 A8,8 0 0 1 148,280 Z" />
      <circle cx="180" cy="320" r="18" fill="#00d4ff" />
      <text x="180" y="325" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1923" text-anchor="middle">2</text>
      <text x="220" y="315" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">向量化处理</text>
      <text x="220" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">文档切片 → Embedding 模型 → 向量数据库</text>
      <path fill="none" stroke="#00d4ff" stroke-width="1.5" d="M1024,310 H1056 A4,4 0 0 1 1060,314 V326 A4,4 0 0 1 1056,330 H1024 A4,4 0 0 1 1020,326 V314 A4,4 0 0 1 1024,310 Z" />
      <line x1="1025" y1="320" x2="1055" y2="320" stroke="#00d4ff" stroke-width="1.5" />
    </g>

    
    <g id="card-3">
      <path fill="#1a2332" stroke="#00d4ff" stroke-opacity="0.2" d="M148,380 H1132 A8,8 0 0 1 1140,388 V452 A8,8 0 0 1 1132,460 H148 A8,8 0 0 1 140,452 V388 A8,8 0 0 1 148,380 Z" />
      <circle cx="180" cy="420" r="18" fill="#00d4ff" />
      <text x="180" y="425" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1923" text-anchor="middle">3</text>
      <text x="220" y="415" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">语义检索</text>
      <text x="220" y="440" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">基于余弦相似度的 top-k 召回</text>
      <circle cx="1040" cy="420" r="12" fill="none" stroke="#00d4ff" stroke-width="1.5" />
      <circle cx="1040" cy="420" r="4" fill="#00d4ff" />
      <line x1="1040" y1="408" x2="1040" y2="400" stroke="#00d4ff" stroke-width="1.5" />
      <line x1="1040" y1="432" x2="1040" y2="440" stroke="#00d4ff" stroke-width="1.5" />
      <line x1="1028" y1="420" x2="1020" y2="420" stroke="#00d4ff" stroke-width="1.5" />
      <line x1="1052" y1="420" x2="1060" y2="420" stroke="#00d4ff" stroke-width="1.5" />
    </g>

    
    <g id="card-4">
      <path fill="#1a2332" stroke="#00d4ff" stroke-opacity="0.2" d="M148,480 H1132 A8,8 0 0 1 1140,488 V552 A8,8 0 0 1 1132,560 H148 A8,8 0 0 1 140,552 V488 A8,8 0 0 1 148,480 Z" />
      <circle cx="180" cy="520" r="18" fill="#00d4ff" />
      <text x="180" y="525" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1923" text-anchor="middle">4</text>
      <text x="220" y="515" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">注入推理</text>
      <text x="220" y="540" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">将检索上下文注入 LLM Prompt 进行生成</text>
      <path d="M1020 510 L1060 510 L1060 530 L1020 530 Z" fill="none" stroke="#00d4ff" stroke-width="1.5" />
      <text x="1040" y="525" font-family="monospace" font-size="10" fill="#00d4ff" text-anchor="middle">{ctx}</text>
    </g>

    
    <g id="card-5">
      <path fill="#1a2332" stroke="#00d4ff" stroke-opacity="0.2" d="M148,580 H1132 A8,8 0 0 1 1140,588 V652 A8,8 0 0 1 1132,660 H148 A8,8 0 0 1 140,652 V588 A8,8 0 0 1 148,580 Z" />
      <circle cx="180" cy="620" r="18" fill="#00d4ff" />
      <text x="180" y="625" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f1923" text-anchor="middle">5</text>
      <text x="220" y="615" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">核心特点</text>
      <text x="220" y="640" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">灵活 · 低成本 · 实时更新 | 精度受限于检索质量</text>
      <path d="M1020 620 L1030 610 L1040 620 L1050 610 L1060 620" fill="none" stroke="#00d4ff" stroke-width="1.5" />
    </g>
  </g>

  
  <g id="decor">
    <circle cx="1200" cy="80" r="40" fill="none" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="2" />
    <circle cx="1200" cy="80" r="20" fill="none" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="2" />
    <line x1="1160" y1="80" x2="1240" y2="80" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="1" />
    <line x1="1200" y1="40" x2="1200" y2="120" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="1" />
    <path fill="none" stroke="#00d4ff" stroke-opacity="0.05" stroke-width="1" d="M1184,60 H1216 A4,4 0 0 1 1220,64 V96 A4,4 0 0 1 1216,100 H1184 A4,4 0 0 1 1180,96 V64 A4,4 0 0 1 1184,60 Z" />
  </g>
</svg>