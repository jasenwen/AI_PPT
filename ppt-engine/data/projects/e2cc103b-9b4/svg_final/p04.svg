<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332" />
      <stop offset="100%" stop-color="#151d28" />
    </linearGradient>
  </defs>

  
  <rect width="1280" height="720" fill="#0f1923" />
  
  
  <path d="M40 40 H200 M40 40 V200" stroke="#1a2332" stroke-width="2" fill="none" />
  <path d="M1240 40 H1080 M1240 40 V200" stroke="#1a2332" stroke-width="2" fill="none" />
  <path d="M40 680 H200 M40 680 V520" stroke="#1a2332" stroke-width="2" fill="none" />
  <path d="M1240 680 H1080 M1240 680 V520" stroke="#1a2332" stroke-width="2" fill="none" />

  
  <g id="header">
    <text x="80" y="110" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">大模型的知识困境</text>
    <line x1="80" y1="135" x2="240" y2="135" stroke="#00d4ff" stroke-width="4" filter="url(#glow)" />
    <text x="80" y="175" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#8e9eab">PAGE 04 / 21</text>
  </g>

  
  <g id="problem-cards">
    
    <path fill="url(#cardGrad)" stroke="#2a3b4c" stroke-width="1" d="M88,220 H332 A8,8 0 0 1 340,228 V312 A8,8 0 0 1 332,320 H88 A8,8 0 0 1 80,312 V228 A8,8 0 0 1 88,220 Z" />
    <text x="110" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff" filter="url(#glow)">01</text>
    <text x="145" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">幻觉问题</text>
    <text x="110" y="295" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">模型可能生成与事实不符的内容</text>

    
    <path fill="url(#cardGrad)" stroke="#2a3b4c" stroke-width="1" d="M368,220 H612 A8,8 0 0 1 620,228 V312 A8,8 0 0 1 612,320 H368 A8,8 0 0 1 360,312 V228 A8,8 0 0 1 368,220 Z" />
    <text x="390" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff" filter="url(#glow)">02</text>
    <text x="425" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">知识时效性</text>
    <text x="390" y="295" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">训练数据截止后无法感知新信息</text>

    
    <path fill="url(#cardGrad)" stroke="#2a3b4c" stroke-width="1" d="M88,340 H332 A8,8 0 0 1 340,348 V432 A8,8 0 0 1 332,440 H88 A8,8 0 0 1 80,432 V348 A8,8 0 0 1 88,340 Z" />
    <text x="110" y="380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff" filter="url(#glow)">03</text>
    <text x="145" y="380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">领域专业性</text>
    <text x="110" y="415" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">通用模型在垂直领域表现不足</text>

    
    <path fill="url(#cardGrad)" stroke="#2a3b4c" stroke-width="1" d="M368,340 H612 A8,8 0 0 1 620,348 V432 A8,8 0 0 1 612,440 H368 A8,8 0 0 1 360,432 V348 A8,8 0 0 1 368,340 Z" />
    <text x="390" y="380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#00d4ff" filter="url(#glow)">04</text>
    <text x="425" y="380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">可解释性</text>
    <text x="390" y="415" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">黑盒推理，难以追溯知识来源</text>
  </g>

  
  <path d="M640 320 L700 320" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" />
  <polygon points="700,314 712,320 700,326" fill="#00d4ff" filter="url(#glow)" />

  
  <g id="solution-card">
    <path fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="2" filter="url(#glow)" d="M732,220 H1208 A12,12 0 0 1 1220,232 V488 A12,12 0 0 1 1208,500 H732 A12,12 0 0 1 720,488 V232 A12,12 0 0 1 732,220 Z" />
    <path fill="#00d4ff" d="M723,220 H1217 A3,3 0 0 1 1220,223 V223 A3,3 0 0 1 1217,226 H723 A3,3 0 0 1 720,223 V223 A3,3 0 0 1 723,220 Z" />
    
    <text x="760" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">→ 两种主流解决方案</text>
    <text x="760" y="330" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" fill="#00d4ff">知识图谱 &amp; RAG</text>
    <text x="760" y="370" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">通过外部结构化知识与检索增强机制，</text>
    <text x="760" y="395" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8e9eab">突破大模型固有局限，实现精准可控。</text>
    
    
    <circle cx="1160" cy="260" r="24" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4" />
    <circle cx="1160" cy="260" r="10" fill="#00d4ff" opacity="0.2" />
    <line x1="1160" y1="230" x2="1160" y2="290" stroke="#00d4ff" stroke-width="1" opacity="0.3" />
    <line x1="1130" y1="260" x2="1190" y2="260" stroke="#00d4ff" stroke-width="1" opacity="0.3" />
  </g>

  
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#1a2332" stroke-width="2" />
  <text x="80" y="705" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8e9eab">AI KNOWLEDGE ENGINEERING SERIES</text>
</svg>