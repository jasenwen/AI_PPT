<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#1a2332"/>
  
  <g id="bg-tech-grid" opacity="0.04">
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#00d4ff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="640" cy="360" r="240" fill="none" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <g id="header">
    <text x="80" y="95" font-family="sans-serif" font-size="38" font-weight="bold" fill="#ffffff">知识图谱（KG）核心原理</text>
    <text x="80" y="130" font-family="sans-serif" font-size="16" fill="#8e9eab">CORE PRINCIPLES OF KNOWLEDGE GRAPHS</text>
    <text x="1180" y="95" font-family="monospace" font-size="14" fill="#00d4ff">06 / 21</text>
    <line x1="80" y1="155" x2="1200" y2="155" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  </g>

  <line x1="640" y1="180" x2="640" y2="680" stroke="#00d4ff" stroke-width="1" opacity="0.15" stroke-dasharray="6 6"/>

  <g id="content-points">
    <g id="point-1">
      <text x="80" y="215" font-family="monospace" font-size="18" fill="#00d4ff">01</text>
      <text x="115" y="215" font-family="sans-serif" font-size="18" fill="#ffffff">基于 &lt;实体-关系-实体&gt; 三元组的结构化知识库</text>
      <line x1="80" y1="235" x2="100" y2="235" stroke="#00d4ff" stroke-width="2"/>
    </g>
    
    <g id="point-2">
      <text x="80" y="315" font-family="monospace" font-size="18" fill="#00d4ff">02</text>
      <text x="115" y="315" font-family="sans-serif" font-size="18" fill="#ffffff">Schema 先行：预定义本体（Ontology）约束语义</text>
      <line x1="80" y1="335" x2="100" y2="335" stroke="#00d4ff" stroke-width="2"/>
    </g>
    
    <g id="point-3">
      <text x="80" y="415" font-family="monospace" font-size="18" fill="#00d4ff">03</text>
      <text x="115" y="415" font-family="sans-serif" font-size="18" fill="#ffffff">推理机制：路径推理、规则推理、图算法（如 PageRank）</text>
      <line x1="80" y1="435" x2="100" y2="435" stroke="#00d4ff" stroke-width="2"/>
    </g>
    
    <g id="point-4">
      <text x="80" y="515" font-family="monospace" font-size="18" fill="#00d4ff">04</text>
      <text x="115" y="515" font-family="sans-serif" font-size="18" fill="#ffffff">典型代表：Google Knowledge Graph、Wikidata</text>
      <line x1="80" y1="535" x2="100" y2="535" stroke="#00d4ff" stroke-width="2"/>
    </g>
    
    <g id="point-5">
      <text x="80" y="615" font-family="monospace" font-size="18" fill="#00d4ff">05</text>
      <text x="115" y="615" font-family="sans-serif" font-size="18" fill="#ffffff">特点：高精度、可解释、但构建成本高</text>
      <line x1="80" y1="635" x2="100" y2="635" stroke="#00d4ff" stroke-width="2"/>
    </g>
  </g>

  <g id="kg-visualization">
    <polygon points="880,240 1080,280 1120,440 1020,580 820,540 780,380" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.12"/>
    
    <line x1="950" y1="320" x2="1050" y2="240" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="1050" y1="240" x2="1120" y2="400" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="1120" y1="400" x2="1080" y2="540" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="1080" y1="540" x2="980" y2="500" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="980" y1="500" x2="950" y2="320" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="950" y1="320" x2="1080" y2="540" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
    <line x1="1050" y1="240" x2="980" y2="500" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
    
    <circle cx="950" cy="320" r="10" fill="#00d4ff" opacity="0.9"/>
    <circle cx="950" cy="320" r="18" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <circle cx="1050" cy="240" r="8" fill="#ffffff" opacity="0.8"/>
    <circle cx="1120" cy="400" r="9" fill="#00d4ff" opacity="0.9"/>
    <circle cx="1080" cy="540" r="7" fill="#ffffff" opacity="0.8"/>
    <circle cx="980" cy="500" r="11" fill="#00d4ff" opacity="0.9"/>
    <circle cx="980" cy="500" r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    
    <text x="1065" y="235" font-family="monospace" font-size="11" fill="#8e9eab">Entity_A</text>
    <text x="1135" y="395" font-family="monospace" font-size="11" fill="#8e9eab">Relation_X</text>
    <text x="1095" y="535" font-family="monospace" font-size="11" fill="#8e9eab">Entity_B</text>
    <text x="995" y="495" font-family="monospace" font-size="11" fill="#8e9eab">Ontology</text>
    
    <rect x="860" y="300" width="40" height="2" fill="#00d4ff" opacity="0.6"/>
    <rect x="860" y="306" width="25" height="2" fill="#00d4ff" opacity="0.4"/>
    <circle cx="1180" cy="320" r="3" fill="#00d4ff" opacity="0.7"/>
    <circle cx="1180" cy="330" r="3" fill="#00d4ff" opacity="0.5"/>
    <circle cx="1180" cy="340" r="3" fill="#00d4ff" opacity="0.3"/>
  </g>
</svg>