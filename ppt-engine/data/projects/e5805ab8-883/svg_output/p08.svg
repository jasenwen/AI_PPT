<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <g id="slide-background">
    <rect width="1280" height="720" fill="#0B1120"/>
    <circle cx="1150" cy="120" r="320" fill="#1E293B" opacity="0.25"/>
    <circle cx="120" cy="620" r="280" fill="#1E293B" opacity="0.2"/>
    <path d="M0 0 L1280 0 L1280 720 L0 720 Z" fill="url(#bgGrad)" opacity="0"/>
  </g>
  
  <g id="title-section">
    <text x="640" y="115" font-family="Microsoft YaHei, SimHei, Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" fill="#F8FAFC" text-anchor="middle">总结与展望</text>
    <line x1="550" y1="155" x2="730" y2="155" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <g id="content-cards">
    <g id="point-1">
      <rect x="240" y="250" width="800" height="84" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <rect x="240" y="250" width="6" height="84" rx="3" fill="#3B82F6"/>
      <text x="285" y="300" font-family="Microsoft YaHei, SimHei, Arial, Helvetica, sans-serif" font-size="26" fill="#E2E8F0">知识图谱是连接数据与智能的关键桥梁</text>
    </g>
    
    <g id="point-2">
      <rect x="240" y="370" width="800" height="84" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <rect x="240" y="370" width="6" height="84" rx="3" fill="#10B981"/>
      <text x="285" y="420" font-family="Microsoft YaHei, SimHei, Arial, Helvetica, sans-serif" font-size="26" fill="#E2E8F0">核心技术日趋成熟 → 产业落地加速</text>
    </g>
    
    <g id="point-3">
      <rect x="240" y="490" width="800" height="84" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <rect x="240" y="490" width="6" height="84" rx="3" fill="#8B5CF6"/>
      <text x="285" y="540" font-family="Microsoft YaHei, SimHei, Arial, Helvetica, sans-serif" font-size="26" fill="#E2E8F0">未来：LLM + KG 深度融合，迈向可信 AI</text>
    </g>
  </g>
  
  <g id="footer-decoration">
    <line x1="560" y1="650" x2="720" y2="650" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <text x="640" y="685" font-family="Microsoft YaHei, SimHei, Arial, Helvetica, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">THANK YOU</text>
  </g>
