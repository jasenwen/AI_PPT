<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <g id="slide-header">
    <text x="640" y="80" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#0F172A" text-anchor="middle">核心技术架构</text>
    <line x1="60" y1="115" x2="1220" y2="115" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <g id="architecture-diagram">
    <g id="card-extraction">
      <rect x="60" y="200" width="200" height="220" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <circle cx="160" cy="240" r="22" fill="#EFF6FF"/>
      <text x="160" y="248" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB" text-anchor="middle">1</text>
      <text x="160" y="285" font-family="sans-serif" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">知识抽取</text>
      <text x="160" y="315" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• NER实体识别</text>
      <text x="160" y="340" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 关系抽取</text>
      <text x="160" y="365" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 属性抽取</text>
    </g>
    <g id="card-fusion">
      <rect x="300" y="200" width="200" height="220" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <circle cx="400" cy="240" r="22" fill="#EFF6FF"/>
      <text x="400" y="248" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB" text-anchor="middle">2</text>
      <text x="400" y="285" font-family="sans-serif" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">知识融合</text>
      <text x="400" y="315" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 实体对齐</text>
      <text x="400" y="340" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 共指消解</text>
      <text x="400" y="365" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 冲突消解</text>
    </g>
    <g id="card-storage">
      <rect x="540" y="200" width="200" height="220" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <circle cx="640" cy="240" r="22" fill="#EFF6FF"/>
      <text x="640" y="248" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB" text-anchor="middle">3</text>
      <text x="640" y="285" font-family="sans-serif" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">知识存储</text>
      <text x="640" y="315" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 图数据库 (Neo4j / JanusGraph)</text>
      <text x="640" y="340" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 图谱建模</text>
      <text x="640" y="365" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 索引优化</text>
    </g>
    <g id="card-reasoning">
      <rect x="780" y="200" width="200" height="220" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <circle cx="880" cy="240" r="22" fill="#EFF6FF"/>
      <text x="880" y="248" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB" text-anchor="middle">4</text>
      <text x="880" y="285" font-family="sans-serif" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">知识推理</text>
      <text x="880" y="315" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 规则推理</text>
      <text x="880" y="340" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 图神经网络</text>
      <text x="880" y="365" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 链接预测</text>
    </g>
    <g id="card-update">
      <rect x="1020" y="200" width="200" height="220" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <circle cx="1120" cy="240" r="22" fill="#EFF6FF"/>
      <text x="1120" y="248" font-family="sans-serif" font-size="18" font-weight="bold" fill="#2563EB" text-anchor="middle">5</text>
      <text x="1120" y="285" font-family="sans-serif" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">知识更新</text>
      <text x="1120" y="315" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 增量学习</text>
      <text x="1120" y="340" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 动态维护</text>
      <text x="1120" y="365" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">• 版本控制</text>
    </g>
    <g id="connectors">
      <line x1="260" y1="310" x2="295" y2="310" stroke="#94A3B8" stroke-width="2"/>
      <polygon points="295,306 305,310 295,314" fill="#94A3B8"/>
      <line x1="500" y1="310" x2="535" y2="310" stroke="#94A3B8" stroke-width="2"/>
      <polygon points="535,306 545,310 535,314" fill="#94A3B8"/>
      <line x1="740" y1="310" x2="775" y2="310" stroke="#94A3B8" stroke-width="2"/>
      <polygon points="775,306 785,310 775,314" fill="#94A3B8"/>
      <line x1="980" y1="310" x2="1015" y2="310" stroke="#94A3B8" stroke-width="2"/>
      <polygon points="1015,306 1025,310 1015,314" fill="#94A3B8"/>
    </g>
  </g>
  <g id="footer">
    <text x="1220" y="690" font-family="sans-serif" font-size="14" fill="#94A3B8" text-anchor="end">4 / 9</text>
  </g>
</svg>