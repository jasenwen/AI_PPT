<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <circle cx="1080" cy="380" r="340" fill="#EFF6FF" opacity="0.6"/>
  
  <g id="network-graphic" opacity="0.2">
    <line x1="880" y1="160" x2="1020" y2="100" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1020" y1="100" x2="1180" y2="180" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1020" y1="100" x2="1080" y2="260" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1080" y1="260" x2="1180" y2="180" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1080" y1="260" x2="1140" y2="380" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1140" y1="380" x2="1240" y2="320" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1140" y1="380" x2="1180" y2="500" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1180" y1="500" x2="1040" y2="460" stroke="#94A3B8" stroke-width="2"/>
    <line x1="1040" y1="460" x2="880" y2="540" stroke="#94A3B8" stroke-width="2"/>
    <line x1="880" y1="540" x2="980" y2="440" stroke="#94A3B8" stroke-width="2"/>
    <line x1="980" y1="440" x2="1040" y2="460" stroke="#94A3B8" stroke-width="2"/>
    
    <circle cx="880" cy="160" r="8" fill="#60A5FA"/>
    <circle cx="1020" cy="100" r="12" fill="#3B82F6"/>
    <circle cx="1180" cy="180" r="8" fill="#60A5FA"/>
    <circle cx="1080" cy="260" r="10" fill="#2563EB"/>
    <circle cx="1140" cy="380" r="12" fill="#3B82F6"/>
    <circle cx="1240" cy="320" r="8" fill="#60A5FA"/>
    <circle cx="1180" cy="500" r="10" fill="#2563EB"/>
    <circle cx="1040" cy="460" r="8" fill="#60A5FA"/>
    <circle cx="880" cy="540" r="10" fill="#3B82F6"/>
    <circle cx="980" cy="440" r="8" fill="#60A5FA"/>
  </g>

  <g id="title-section">
    <text x="80" y="115" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="52" font-weight="800" fill="#0F172A">什么是知识图谱</text>
    <line x1="80" y1="140" x2="240" y2="140" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g id="content-list">
    <g id="point-1">
      <circle cx="90" cy="230" r="28" fill="#2563EB"/>
      <text x="90" y="239" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
      <text x="145" y="235" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="30" font-weight="700" fill="#1E293B">定义</text>
      <text x="145" y="275" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="22" fill="#475569">用图结构描述实体及其语义关系的知识库</text>
    </g>

    <g id="point-2">
      <circle cx="90" cy="370" r="28" fill="#3B82F6"/>
      <text x="90" y="379" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
      <text x="145" y="375" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="30" font-weight="700" fill="#1E293B">基本单元</text>
      <text x="145" y="415" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="22" fill="#475569">&lt;实体, 关系, 实体&gt; 三元组</text>
    </g>

    <g id="point-3">
      <circle cx="90" cy="510" r="28" fill="#60A5FA"/>
      <text x="90" y="519" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
      <text x="145" y="515" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="30" font-weight="700" fill="#1E293B">本质</text>
      <text x="145" y="555" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="22" fill="#475569">将碎片化信息组织成结构化知识网络</text>
    </g>
  </g>

  <g id="footer">
    <line x1="80" y1="660" x2="1200" y2="660" stroke="#E2E8F0" stroke-width="2"/>
    <text x="1180" y="695" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif" font-size="18" fill="#94A3B8" text-anchor="end">3 / 9</text>
  </g>
</svg>