<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="#667eea" opacity="0.05"/>
  <circle cx="200" cy="650" r="150" fill="#f5576c" opacity="0.04"/>
  <circle cx="640" cy="360" r="300" fill="#4facfe" opacity="0.03"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#0d1137" opacity="0.8"/>
  <line x1="0" y1="80" x2="1280" y2="80" stroke="#667eea" stroke-width="2" opacity="0.5"/>

  <!-- Title -->
  <text x="640" y="52" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">核心技术架构</text>

  <!-- Subtitle -->
  <text x="640" y="72" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#8892b0">Knowledge Graph Core Technology Architecture</text>

  <!-- Pipeline arrow background -->
  <g id="pipeline-arrows">
    <!-- Arrow from card1 to card2 -->
    <path d="M 290 360 L 340 360" stroke="#ffffff" stroke-width="2" opacity="0.3" marker-end="url(#arrowhead)"/>
    <!-- Arrow from card2 to card3 -->
    <path d="M 550 360 L 600 360" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <!-- Arrow from card3 to card4 -->
    <path d="M 810 360 L 860 360" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <!-- Arrow from card4 to card5 -->
    <path d="M 1070 360 L 1120 360" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Card 1: 知识抽取 -->
  <g id="card1" filter="url(#shadow)">
    <rect x="40" y="180" width="240" height="360" rx="16" fill="#1e2452" stroke="#667eea" stroke-width="2" opacity="0.95"/>
    <rect x="40" y="180" width="240" height="6" rx="3" fill="url(#card1)"/>
    
    <!-- Icon circle -->
    <circle cx="160" cy="240" r="36" fill="url(#card1)" opacity="0.2"/>
    <circle cx="160" cy="240" r="28" fill="none" stroke="#667eea" stroke-width="2"/>
    
    <!-- NER icon - magnifying glass over text -->
    <circle cx="155" cy="235" r="10" fill="none" stroke="#667eea" stroke-width="2.5"/>
    <line x1="162" y1="242" x2="172" y2="252" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
    <text x="148" y="238" font-family="Arial, sans-serif" font-size="8" fill="#667eea" font-weight="bold">Aa</text>
    
    <!-- Step number -->
    <text x="160" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#667eea" font-weight="bold" letter-spacing="2">STEP 01</text>
    
    <!-- Title -->
    <text x="160" y="335" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">知识抽取</text>
    <text x="160" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">Knowledge Extraction</text>
    
    <!-- Divider -->
    <line x1="80" y1="370" x2="240" y2="370" stroke="#667eea" stroke-width="1" opacity="0.3"/>
    
    <!-- Items -->
    <g transform="translate(60, 395)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#667eea" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">NER实体识别</text>
    </g>
    <g transform="translate(60, 430)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#667eea" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">关系抽取</text>
    </g>
    <g transform="translate(60, 465)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#667eea" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">属性抽取</text>
    </g>
    
    <!-- Bottom decorative dots -->
    <circle cx="100" cy="510" r="3" fill="#667eea" opacity="0.3"/>
    <circle cx="120" cy="510" r="3" fill="#667eea" opacity="0.5"/>
    <circle cx="140" cy="510" r="3" fill="#667eea" opacity="0.7"/>
    <circle cx="160" cy="510" r="3" fill="#667eea" opacity="0.9"/>
    <circle cx="180" cy="510" r="3" fill="#667eea" opacity="0.7"/>
    <circle cx="200" cy="510" r="3" fill="#667eea" opacity="0.5"/>
    <circle cx="220" cy="510" r="3" fill="#667eea" opacity="0.3"/>
  </g>

  <!-- Card 2: 知识融合 -->
  <g id="card2" filter="url(#shadow)">
    <rect x="300" y="180" width="240" height="360" rx="16" fill="#1e2452" stroke="#f5576c" stroke-width="2" opacity="0.95"/>
    <rect x="300" y="180" width="240" height="6" rx="3" fill="url(#card2)"/>
    
    <!-- Icon circle -->
    <circle cx="420" cy="240" r="36" fill="#f5576c" opacity="0.2"/>
    <circle cx="420" cy="240" r="28" fill="none" stroke="#f5576c" stroke-width="2"/>
    
    <!-- Merge icon - two overlapping circles -->
    <circle cx="412" cy="238" r="10" fill="none" stroke="#f5576c" stroke-width="2"/>
    <circle cx="428" cy="238" r="10" fill="none" stroke="#f5576c" stroke-width="2"/>
    <text x="418" y="242" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" font-weight="bold">∩</text>
    
    <!-- Step number -->
    <text x="420" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#f5576c" font-weight="bold" letter-spacing="2">STEP 02</text>
    
    <!-- Title -->
    <text x="420" y="335" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">知识融合</text>
    <text x="420" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">Knowledge Fusion</text>
    
    <!-- Divider -->
    <line x1="340" y1="370" x2="500" y2="370" stroke="#f5576c" stroke-width="1" opacity="0.3"/>
    
    <!-- Items -->
    <g transform="translate(320, 395)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#f5576c" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">实体对齐</text>
    </g>
    <g transform="translate(320, 430)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#f5576c" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">共指消解</text>
    </g>
    <g transform="translate(320, 465)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#f5576c" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">冲突消解</text>
    </g>
    
    <!-- Bottom decorative dots -->
    <circle cx="360" cy="510" r="3" fill="#f5576c" opacity="0.3"/>
    <circle cx="380" cy="510" r="3" fill="#f5576c" opacity="0.5"/>
    <circle cx="400" cy="510" r="3" fill="#f5576c" opacity="0.7"/>
    <circle cx="420" cy="510" r="3" fill="#f5576c" opacity="0.9"/>
    <circle cx="440" cy="510" r="3" fill="#f5576c" opacity="0.7"/>
    <circle cx="460" cy="510" r="3" fill="#f5576c" opacity="0.5"/>
    <circle cx="480" cy="510" r="3" fill="#f5576c" opacity="0.3"/>
  </g>

  <!-- Card 3: 知识存储 -->
  <g id="card3" filter="url(#shadow)">
    <rect x="560" y="180" width="240" height="360" rx="16" fill="#1e2452" stroke="#4facfe" stroke-width="2" opacity="0.95"/>
    <rect x="560" y="180" width="240" height="6" rx="3" fill="url(#card3)"/>
    
    <!-- Icon circle -->
    <circle cx="680" cy="240" r="36" fill="#4facfe" opacity="0.2"/>
    <circle cx="680" cy="240" r="28" fill="none" stroke="#4facfe" stroke-width="2"/>
    
    <!-- Database icon -->
    <ellipse cx="680" cy="230" rx="14" ry="5" fill="none" stroke="#4facfe" stroke-width="2"/>
    <path d="M 666 230 L 666 248 Q 666 253 680 253 Q 694 253 694 248 L 694 230" fill="none" stroke="#4facfe" stroke-width="2"/>
    <path d="M 666 239 Q 666 244 680 244 Q 694 244 694 239" fill="none" stroke="#4facfe" stroke-width="1.5"/>
    
    <!-- Step number -->
    <text x="680" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4facfe" font-weight="bold" letter-spacing="2">STEP 03</text>
    
    <!-- Title -->
    <text x="680" y="335" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">知识存储</text>
    <text x="680" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">Knowledge Storage</text>
    
    <!-- Divider -->
    <line x1="600" y1="370" x2="760" y2="370" stroke="#4facfe" stroke-width="1" opacity="0.3"/>
    
    <!-- Items -->
    <g transform="translate(580, 395)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#4facfe" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">图数据库建模</text>
    </g>
    <g transform="translate(580, 430)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#4facfe" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ccd6f6">Neo4j / JanusGraph</text>
    </g>
    <g transform="translate(580, 465)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#4facfe" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">Schema设计</text>
    </g>
    
    <!-- Bottom decorative dots -->
    <circle cx="620" cy="510" r="3" fill="#4facfe" opacity="0.3"/>
    <circle cx="640" cy="510" r="3" fill="#4facfe" opacity="0.5"/>
    <circle cx="660" cy="510" r="3" fill="#4facfe" opacity="0.7"/>
    <circle cx="680" cy="510" r="3" fill="#4facfe" opacity="0.9"/>
    <circle cx="700" cy="510" r="3" fill="#4facfe" opacity="0.7"/>
    <circle cx="720" cy="510" r="3" fill="#4facfe" opacity="0.5"/>
    <circle cx="740" cy="510" r="3" fill="#4facfe" opacity="0.3"/>
  </g>

  <!-- Card 4: 知识推理 -->
  <g id="card4" filter="url(#shadow)">
    <rect x="820" y="180" width="240" height="360" rx="16" fill="#1e2452" stroke="#43e97b" stroke-width="2" opacity="0.95"/>
    <rect x="820" y="180" width="240" height="6" rx="3" fill="url(#card4)"/>
    
    <!-- Icon circle -->
    <circle cx="940" cy="240" r="36" fill="#43e97b" opacity="0.2"/>
    <circle cx="940" cy="240" r="28" fill="none" stroke="#43e97b" stroke-width="2"/>
    
    <!-- Brain/GNN icon -->
    <circle cx="940" cy="235" r="12" fill="none" stroke="#43e97b" stroke-width="2"/>
    <circle cx="934" cy="230" r="2" fill="#43e97b"/>
    <circle cx="946" cy="230" r="2" fill="#43e97b"/>
    <circle cx="940" cy="240" r="2" fill="#43e97b"/>
    <line x1="934" y1="230" x2="940" y2="240" stroke="#43e97b" stroke-width="1"/>
    <line x1="946" y1="230" x2="940" y2="240" stroke="#43e97b" stroke-width="1"/>
    <line x1="934" y1="230" x2="946" y2="230" stroke="#43e97b" stroke-width="1"/>
    
    <!-- Step number -->
    <text x="940" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#43e97b" font-weight="bold" letter-spacing="2">STEP 04</text>
    
    <!-- Title -->
    <text x="940" y="335" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">知识推理</text>
    <text x="940" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">Knowledge Reasoning</text>
    
    <!-- Divider -->
    <line x1="860" y1="370" x2="1020" y2="370" stroke="#43e97b" stroke-width="1" opacity="0.3"/>
    
    <!-- Items -->
    <g transform="translate(840, 395)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#43e97b" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">规则推理</text>
    </g>
    <g transform="translate(840, 430)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#43e97b" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ccd6f6">图神经网络推理</text>
    </g>
    <g transform="translate(840, 465)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#43e97b" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">链接预测</text>
    </g>
    
    <!-- Bottom decorative dots -->
    <circle cx="880" cy="510" r="3" fill="#43e97b" opacity="0.3"/>
    <circle cx="900" cy="510" r="3" fill="#43e97b" opacity="0.5"/>
    <circle cx="920" cy="510" r="3" fill="#43e97b" opacity="0.7"/>
    <circle cx="940" cy="510" r="3" fill="#43e97b" opacity="0.9"/>
    <circle cx="960" cy="510" r="3" fill="#43e97b" opacity="0.7"/>
    <circle cx="980" cy="510" r="3" fill="#43e97b" opacity="0.5"/>
    <circle cx="1000" cy="510" r="3" fill="#43e97b" opacity="0.3"/>
  </g>

  <!-- Card 5: 知识更新 -->
  <g id="card5" filter="url(#shadow)">
    <rect x="1080" y="180" width="200" height="360" rx="16" fill="#1e2452" stroke="#fa709a" stroke-width="2" opacity="0.95"/>
    <rect x="1080" y="180" width="200" height="6" rx="3" fill="url(#card5)"/>
    
    <!-- Icon circle -->
    <circle cx="1180" cy="240" r="36" fill="#fa709a" opacity="0.2"/>
    <circle cx="1180" cy="240" r="28" fill="none" stroke="#fa709a" stroke-width="2"/>
    
    <!-- Refresh/update icon -->
    <path d="M 1170 232 Q 1180 222 1190 232" fill="none" stroke="#fa709a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 1190 248 Q 1180 258 1170 248" fill="none" stroke="#fa709a" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="1190,228 1194,234 1186,234" fill="#fa709a"/>
    <polygon points="1170,252 1166,246 1174,246" fill="#fa709a"/>
    
    <!-- Step number -->
    <text x="1180" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fa709a" font-weight="bold" letter-spacing="2">STEP 05</text>
    
    <!-- Title -->
    <text x="1180" y="335" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">知识更新</text>
    <text x="1180" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">Knowledge Update</text>
    
    <!-- Divider -->
    <line x1="1110" y1="370" x2="1250" y2="370" stroke="#fa709a" stroke-width="1" opacity="0.3"/>
    
    <!-- Items -->
    <g transform="translate(1100, 395)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#fa709a" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">增量学习</text>
    </g>
    <g transform="translate(1100, 430)">
      <rect x="0" y="0" width="12" height="12" rx="3" fill="#fa709a" opacity="0.6"/>
      <text x="22" y="11" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ccd6f6">动态维护机制</text>
    </g>
    
    <!-- Bottom decorative dots -->
    <circle cx="1130" cy="510" r="3" fill="#fa709a" opacity="0.3"/>
    <circle cx="1150" cy="510" r="3" fill="#fa709a" opacity="0.5"/>
    <circle cx="1170" cy="510" r="3" fill="#fa709a" opacity="0.7"/>
    <circle cx="1190" cy="510" r="3" fill="#fa709a" opacity="0.9"/>
    <circle cx="1210" cy="510" r="3" fill="#fa709a" opacity="0.7"/>
    <circle cx="1230" cy="510" r="3" fill="#fa709a" opacity="0.5"/>
  </g>

  <!-- Flow arrows between cards -->
  <g id="flow-arrows">
    <!-- Arrow 1->2 -->
    <g transform="translate(280, 350)">
      <polygon points="0,10 20,0 20,20" fill="#667eea" opacity="0.6"/>
    </g>
    <!-- Arrow 2->3 -->
    <g transform="translate(540, 350)">
      <polygon points="0,10 20,0 20,20" fill="#f5576c" opacity="0.6"/>
    </g>
    <!-- Arrow 3->4 -->
    <g transform="translate(800, 350)">
      <polygon points="0,10 20,0 20,20" fill="#4facfe" opacity="0.6"/>
    </g>
    <!-- Arrow 4->5 -->
    <g transform="translate(1060, 350)">
      <polygon points="0,10 20,0 20,20" fill="#43e97b" opacity="0.6"/>
    </g>
  </g>

  <!-- Connecting line across all cards -->
  <line x1="280" y1="360" x2="1280" y2="360" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Footer -->
  <g id="footer">
    <line x1="0" y1="680" x2="1280" y2="680" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
    
    <!-- Page number -->
    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8892b0">4 / 9</text>
    
    <!-- Company/project name placeholder -->
    <text x="640" y="718" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5080">Knowledge Graph Platform</text>
  </g>

  <!-- Top-left badge -->
  <g id="badge">
    <rect x="20" y="15" width="100" height="28" rx="14" fill="#667eea" opacity="0.2"/>
    <text x="70" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#667eea" font-weight="bold">PART 04</text>
  </g>

  <!-- Right side decorative element -->
  <g id="decoration-right" opacity="0.15">
    <circle cx="1200" cy="100" r="40" fill="none" stroke="#667eea" stroke-width="1"/>
    <circle cx="1200" cy="100" r="25" fill="none" stroke="#667eea" stroke-width="1"/>
    <circle cx="1200" cy="100" r="10" fill="#667eea"/>
  </g>

  <!-- Left side decorative element -->
  <g id="decoration-left" opacity="0.1">
    <circle cx="80" cy="620" r="30" fill="none" stroke="#f5576c" stroke-width="1"/>
    <circle cx="80" cy="620" r="15" fill="none" stroke="#f5576c" stroke-width="1"/>
    <circle cx="80" cy="620" r="5" fill="#f5576c"/>
  </g>
</svg>