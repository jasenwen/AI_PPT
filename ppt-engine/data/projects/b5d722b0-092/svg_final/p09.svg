    <circle cx="640" cy="360" r="200" fill="none" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="12 12" />
    <path fill="#ECF0F1" transform="rotate(45 120 120)" d="M75,60 H165 A15,15 0 0 1 180,75 V165 A15,15 0 0 1 165,180 H75 A15,15 0 0 1 60,165 V75 A15,15 0 0 1 75,60 Z" />
    <path fill="#ECF0F1" transform="rotate(45 1160 600)" d="M1115,540 H1205 A15,15 0 0 1 1220,555 V645 A15,15 0 0 1 1205,660 H1115 A15,15 0 0 1 1100,645 V555 A15,15 0 0 1 1115,540 Z" />
    <circle cx="120" cy="600" r="8" fill="#3498DB" />
    <circle cx="140" cy="600" r="8" fill="#3498DB" />
    <circle cx="160" cy="600" r="8" fill="#3498DB" />
    <circle cx="1120" cy="120" r="8" fill="#3498DB" />
    <circle cx="1140" cy="120" r="8" fill="#3498DB" />
    <circle cx="1160" cy="120" r="8" fill="#3498DB" />
