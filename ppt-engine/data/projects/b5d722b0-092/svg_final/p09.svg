    <line x1="500" y1="355" x2="780" y2="355" stroke="#3498DB" stroke-width="6" stroke-linecap="round" />
    
    <text x="640" y="440" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="#3498DB" text-anchor="middle">Q &amp; A</text>
    
