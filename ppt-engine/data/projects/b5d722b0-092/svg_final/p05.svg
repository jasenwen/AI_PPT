  <g id="card-2">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M672,180 H1188 A12,12 0 0 1 1200,192 V398 A12,12 0 0 1 1188,410 H672 A12,12 0 0 1 660,398 V192 A12,12 0 0 1 672,180 Z" />
