<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="8" height="720" fill="#2563EB"/>
  
  <g id="header">
    <text x="640" y="100" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#0F172A" text-anchor="middle">什么是知识图谱</text>
    <line x1="560" y1="125" x2="720" y2="125" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="point1">
    <circle cx="120" cy="220" r="24" fill="#DBEAFE"/>
    <text x="120" y="228" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#2563EB" text-anchor="middle">1</text>
    <text x="170" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B">定义</text>
    <text x="170" y="255" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#475569">用图结构描述实体及其语义关系的知识库</text>
    <g transform="translate(960, 180)">
      <circle cx="0" cy="0" r="12" fill="#3B82F6"/>
      <circle cx="60" cy="-30" r="12" fill="#60A5FA"/>
      <circle cx="60" cy="30" r="12" fill="#60A5FA"/>
      <line x1="0" y1="0" x2="60" y2="-30" stroke="#93C5FD" stroke-width="3"/>
      <line x1="0" y1="0" x2="60" y2="30" stroke="#93C5FD" stroke-width="3"/>
    </g>
  </g>

  <g id="point2">
    <circle cx="120" cy="360" r="24" fill="#DBEAFE"/>
    <text x="120" y="368" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#2563EB" text-anchor="middle">2</text>
    <text x="170" y="355" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B">基本单元</text>
    <text x="170" y="395" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#475569">&lt;实体, 关系, 实体&gt; 三元组</text>
    <g transform="translate(960, 320)">
      <circle cx="0" cy="0" r="14" fill="#2563EB"/>
      <circle cx="80" cy="0" r="14" fill="#2563EB"/>
      <circle cx="160" cy="0" r="14" fill="#2563EB"/>
      <line x1="14" y1="0" x2="66" y2="0" stroke="#60A5FA" stroke-width="4"/>
      <polygon points="66,-6 76,0 66,6" fill="#60A5FA"/>
      <line x1="94" y1="0" x2="146" y2="0" stroke="#60A5FA" stroke-width="4"/>
      <polygon points="146,-6 156,0 146,6" fill="#60A5FA"/>
    </g>
  </g>

  <g id="point3">
    <circle cx="120" cy="500" r="24" fill="#DBEAFE"/>
    <text x="120" y="508" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#2563EB" text-anchor="middle">3</text>
    <text x="170" y="495" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B">本质</text>
    <text x="170" y="535" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#475569">将碎片化信息组织成结构化知识网络</text>
    <g transform="translate(930, 460)">
      <circle cx="40" cy="0" r="10" fill="#3B82F6"/>
      <circle cx="0" cy="40" r="10" fill="#60A5FA"/>
      <circle cx="80" cy="40" r="10" fill="#60A5FA"/>
      <circle cx="40" cy="80" r="10" fill="#93C5FD"/>
      <line x1="40" y1="10" x2="10" y2="30" stroke="#BFDBFE" stroke-width="3"/>
      <line x1="40" y1="10" x2="70" y2="30" stroke="#BFDBFE" stroke-width="3"/>
      <line x1="10" y1="50" x2="70" y2="50" stroke="#BFDBFE" stroke-width="3"/>
      <line x1="10" y1="50" x2="40" y2="70" stroke="#BFDBFE" stroke-width="3"/>
      <line x1="70" y1="50" x2="40" y2="70" stroke="#BFDBFE" stroke-width="3"/>
    </g>
  </g>

  <g id="footer">
    <line x1="100" y1="680" x2="1180" y2="680" stroke="#E2E8F0" stroke-width="2"/>
    <text x="1180" y="665" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94A3B8" text-anchor="end">3 / 9</text>
  </g>
</svg>