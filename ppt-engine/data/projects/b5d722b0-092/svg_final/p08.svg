<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="background-decorations">
    <circle cx="1150" cy="180" r="220" fill="#38BDF8" opacity="0.04" filter="url(#glow)"/>
    <circle cx="1050" cy="580" r="260" fill="#818CF8" opacity="0.04" filter="url(#glow)"/>
    <path d="M 0 720 L 1280 720 L 1280 690 L 0 690 Z" fill="#0F172A" opacity="0.6"/>
    <line x1="0" y1="690" x2="1280" y2="690" stroke="#334155" stroke-width="1" opacity="0.5"/>
  </g>

  <g id="title-section">
    <text x="640" y="150" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="54" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">总结与展望</text>
    <line x1="520" y1="185" x2="760" y2="185" stroke="url(#grad1)" stroke-width="5" stroke-linecap="round"/>
    <text x="640" y="225" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#94A3B8" text-anchor="middle">SUMMARY &amp; OUTLOOK</text>
  </g>

  <g id="content-item-1">
    <circle cx="220" cy="300" r="32" fill="url(#grad1)"/>
    <text x="220" y="310" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="280" y="308" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#F1F5F9" font-weight="500">知识图谱是连接数据与智能的关键桥梁</text>
    <line x1="280" y1="328" x2="540" y2="328" stroke="#38BDF8" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <g id="content-item-2">
    <circle cx="220" cy="420" r="32" fill="url(#grad2)"/>
    <text x="220" y="430" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="280" y="428" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#F1F5F9" font-weight="500">核心技术日趋成熟 → 产业落地加速</text>
    <line x1="280" y1="448" x2="580" y2="448" stroke="#818CF8" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <g id="content-item-3">
    <circle cx="220" cy="540" r="32" fill="url(#grad3)"/>
    <text x="220" y="550" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="280" y="548" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#F1F5F9" font-weight="500">未来：LLM + KG 深度融合，迈向可信 AI</text>
    <line x1="280" y1="568" x2="620" y2="568" stroke="#34D399" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <g id="closing-section">
    <text x="640" y="680" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#64748B" text-anchor="middle" letter-spacing="6">THANK YOU</text>
  </g>
</svg>