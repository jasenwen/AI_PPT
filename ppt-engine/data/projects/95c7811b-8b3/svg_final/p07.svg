    <text x="710" y="290" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748B">基于临床指南与医学文献构建领域图谱，支持多跳推理与鉴别诊断，提升诊疗准确率。</text>
