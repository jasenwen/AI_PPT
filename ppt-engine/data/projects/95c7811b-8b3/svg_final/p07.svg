    <text x="710" y="560" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748B">将非结构化文本转化为结构化事实三元组，为生成式模型提供可验证的上下文依据。</text>
