    <text x="680" y="470" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 增量学习机制</text>
    <text x="680" y="490" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 动态维护策略</text>
    <text x="680" y="510" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 实时数据同步</text>
