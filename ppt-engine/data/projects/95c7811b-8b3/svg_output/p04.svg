    <text x="400" y="470" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 规则推理引擎</text>
    <text x="400" y="490" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 图神经网络推理</text>
    <text x="400" y="510" font-family="system-ui, sans-serif" font-size="13" fill="#CBD5E1">• 链接预测</text>
