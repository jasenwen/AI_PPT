  <g id="slide-footer">
    <line x1="100" y1="680" x2="1180" y2="680" stroke="#1E293B" stroke-width="2"/>
    <text x="1240" y="670" font-family="system-ui, sans-serif" font-size="14" font-weight="medium" fill="#64748B" text-anchor="end">4 / 9</text>
  </g>
