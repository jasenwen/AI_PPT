    <line x1="520" y1="95" x2="760" y2="95" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="architecture-flow">
    <path d="M 360 330 L 360 400" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)"/>
    <path d="M 640 330 L 640 400" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)"/>
    <path d="M 920 330 L 920 400" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-down)"/>
    <path d="M 500 475 L 660 475" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-right)"/>
  </g>

