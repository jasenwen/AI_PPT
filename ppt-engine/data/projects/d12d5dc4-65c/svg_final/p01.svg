  <g id="title-section">
    <text x="640" y="305" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">知识图谱 — 构建机器认知的基石</text>
