<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <!-- Gradients for Icons -->
    <linearGradient id="grad-search" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad-qa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="grad-rec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="grad-risk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="grad-med" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="grad-llm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0f172a" />
  
  <!-- Decorative Background Elements -->
  <circle cx="1100" cy="100" r="300" fill="#1e293b" opacity="0.5" />
  <circle cx="200" cy="600" r="250" fill="#1e293b" opacity="0.3" />

  <!-- Header Section -->
  <g id="header">
    <text x="80" y="90" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">应用落地场景</text>
    <line x1="80" y1="120" x2="200" y2="120" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" />
    <text x="80" y="160" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#94a3b8">Knowledge Graph Application Scenarios</text>
  </g>

  <!-- Card 1: Intelligent Search -->
  <g id="card-search" transform="translate(80, 200)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-search)" />
    <path d="M52 52 L68 68 M60 48 A12 12 0 1 0 60 72 A12 12 0 1 0 60 48 Z" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">智能搜索</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">语义理解与实体卡片</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 深度解析用户查询意图</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 结构化展示关键实体信息</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 提升搜索准确率与用户体验</text>
  </g>

  <!-- Card 2: Intelligent Q&A -->
  <g id="card-qa" transform="translate(465, 200)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-qa)" />
    <path d="M48 50 H72 V62 H60 L48 74 V50 Z" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="round" />
    <circle cx="54" cy="56" r="2" fill="#ffffff" />
    <circle cx="60" cy="56" r="2" fill="#ffffff" />
    <circle cx="66" cy="56" r="2" fill="#ffffff" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">智能问答</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">KBQA 与对话系统</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 基于知识库的精准问答</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 多轮对话上下文管理</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 自然语言转SQL/SPARQL</text>
  </g>

  <!-- Card 3: Recommendation System -->
  <g id="card-rec" transform="translate(850, 200)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-rec)" />
    <path d="M50 60 L56 66 L70 52" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">推荐系统</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">知识增强推荐</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 利用图谱关系挖掘潜在兴趣</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 解决冷启动问题</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 提供可解释的推荐理由</text>
  </g>

  <!-- Card 4: Risk Control -->
  <g id="card-risk" transform="translate(80, 480)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-risk)" />
    <path d="M50 48 L70 48 L70 60 C70 72 60 80 60 80 C60 80 50 72 50 60 Z" stroke="#ffffff" stroke-width="3" fill="none" stroke-linejoin="round" />
    <path d="M56 60 L59 63 L65 55" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">风险控制</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">关联挖掘与反欺诈</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 识别复杂团伙欺诈行为</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 资金流向异常检测</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 实时风控决策引擎</text>
  </g>

  <!-- Card 5: Medical/Finance -->
  <g id="card-industry" transform="translate(465, 480)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-med)" />
    <path d="M50 60 H70 M60 50 V70" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">医疗/金融</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">行业知识图谱</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 辅助临床诊断与用药建议</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 金融产品关联风险传导</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 垂直领域专业决策支持</text>
  </g>

  <!-- Card 6: LLM Integration -->
  <g id="card-llm" transform="translate(850, 480)">
    <rect width="350" height="250" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <!-- Icon -->
    <circle cx="60" cy="60" r="32" fill="url(#grad-llm)" />
    <circle cx="50" cy="50" r="3" fill="#ffffff" />
    <circle cx="70" cy="50" r="3" fill="#ffffff" />
    <circle cx="60" cy="70" r="3" fill="#ffffff" />
    <path d="M50 50 L70 50 L60 70 Z" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Text -->
    <text x="110" y="55" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">大模型融合</text>
    <text x="110" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">RAG + KG 增强</text>
    <line x1="20" y1="110" x2="330" y2="110" stroke="#334155" stroke-width="1" />
    <text x="20" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 缓解大模型幻觉问题</text>
    <text x="20" y="170" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 结合实时数据与逻辑推理</text>
    <text x="20" y="195" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">• 提升生成内容的准确性</text>
  </g>

</svg>