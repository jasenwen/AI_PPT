<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  
  <g id="slide-header">
    <text x="640" y="95" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="bold" fill="#0F172A" text-anchor="middle">发展历程与里程碑</text>
    <line x1="460" y1="125" x2="820" y2="125" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g id="timeline-card">
    <rect x="90" y="240" width="1100" height="320" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    
    <line x1="180" y1="400" x2="1080" y2="400" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
    
    <g id="milestone-1">
      <circle cx="180" cy="400" r="16" fill="#2563EB"/>
      <circle cx="180" cy="400" r="6" fill="#FFFFFF"/>
      <text x="180" y="355" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B" text-anchor="middle">1960s</text>
      <text x="180" y="455" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155" text-anchor="middle">语义网络 (Semantic Networks)</text>
      <text x="180" y="485" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#64748B" text-anchor="middle">概念的提出</text>
    </g>

    <g id="milestone-2">
      <circle cx="480" cy="400" r="16" fill="#0891B2"/>
      <circle cx="480" cy="400" r="6" fill="#FFFFFF"/>
      <text x="480" y="355" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B" text-anchor="middle">2006</text>
      <text x="480" y="455" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155" text-anchor="middle">链接数据 (Linked Data)</text>
      <text x="480" y="485" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#64748B" text-anchor="middle">运动兴起</text>
    </g>

    <g id="milestone-3">
      <circle cx="780" cy="400" r="16" fill="#7C3AED"/>
      <circle cx="780" cy="400" r="6" fill="#FFFFFF"/>
      <text x="780" y="355" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B" text-anchor="middle">2012</text>
      <text x="780" y="455" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155" text-anchor="middle">Google 正式提出</text>
      <text x="780" y="485" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Knowledge Graph</text>
    </g>

    <g id="milestone-4">
      <circle cx="1080" cy="400" r="16" fill="#DC2626"/>
      <circle cx="1080" cy="400" r="6" fill="#FFFFFF"/>
      <text x="1080" y="355" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#1E293B" text-anchor="middle">2018-至今</text>
      <text x="1080" y="455" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155" text-anchor="middle">大语言模型 + 知识图谱</text>
      <text x="1080" y="485" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">融合新时代</text>
    </g>
  </g>

  <g id="slide-footer">
    <rect x="0" y="695" width="1280" height="25" fill="#F1F5F9"/>
    <text x="640" y="712" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">第 4 / 12 页</text>
  </g>
</svg>