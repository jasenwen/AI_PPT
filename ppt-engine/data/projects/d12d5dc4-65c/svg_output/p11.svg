<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#233A63" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#151E32" stop-opacity="0.9" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)" />
  <rect width="1280" height="720" fill="url(#grid)" />

  <!-- Decorative Background Elements -->
  <g id="decorations" opacity="0.4">
    <circle cx="150" cy="150" r="100" fill="#00E5FF" filter="url(#glow)" opacity="0.1" />
    <circle cx="1100" cy="550" r="150" fill="#00E5FF" filter="url(#glow)" opacity="0.1" />
    <path d="M 0 600 Q 300 500 640 600 T 1280 600" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.2" />
    
    <!-- Abstract Nodes -->
    <g stroke="#00E5FF" stroke-width="1" fill="none" opacity="0.3">
      <line x1="100" y1="100" x2="200" y2="150" />
      <line x1="200" y1="150" x2="180" y2="250" />
      <line x1="180" y1="250" x2="100" y2="100" />
      <circle cx="100" cy="100" r="4" fill="#00E5FF" />
      <circle cx="200" cy="150" r="4" fill="#00E5FF" />
      <circle cx="180" cy="250" r="4" fill="#00E5FF" />
    </g>
  </g>

  <!-- Header Section -->
  <g id="header">
    <text x="640" y="100" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">总结与展望</text>
    <line x1="540" y1="130" x2="740" y2="130" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" />
    <text x="640" y="170" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#B0BEC5" text-anchor="middle">构建下一代认知智能的核心路径</text>
  </g>

  <!-- Main Content Cards -->
  <g id="cards">
    
    <!-- Card 1: Infrastructure -->
    <g transform="translate(80, 200)">
      <!-- Card Background -->
      <rect width="340" height="420" rx="16" fill="url(#cardGrad)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5" />
      
      <!-- Icon: Network/Brain -->
      <g transform="translate(170, 80)">
        <circle cx="0" cy="0" r="40" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="4 4" />
        <circle cx="0" cy="0" r="25" fill="#00E5FF" opacity="0.2" />
        <path d="M-15,-15 L15,15 M-15,15 L15,-15 M0,-25 L0,25 M-25,0 L25,0" stroke="#00E5FF" stroke-width="2" />
        <circle cx="0" cy="0" r="8" fill="#FFFFFF" />
      </g>

      <!-- Title -->
      <text x="170" y="180" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">关键基础设施</text>
      
      <!-- Description -->
      <text x="170" y="230" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#E0E6ED" text-anchor="middle">知识图谱是通向</text>
      <text x="170" y="270" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#E0E6ED" text-anchor="middle">认知智能的基石</text>
      
      <!-- Bullet Points -->
      <g transform="translate(40, 320)">
        <circle cx="0" cy="0" r="4" fill="#00E5FF" />
        <text x="20" y="5" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#B0BEC5">结构化语义关联</text>
        
        <circle cx="0" cy="40" r="4" fill="#00E5FF" />
        <text x="20" y="45" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#B0BEC5">机器可理解的逻辑</text>
      </g>
    </g>

    <!-- Card 2: Next Gen AI -->
    <g transform="translate(470, 200)">
      <!-- Card Background -->
      <rect width="340" height="420" rx="16" fill="url(#cardGrad)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5" />
      
      <!-- Icon: Data + Knowledge -->
      <g transform="translate(170, 80)">
        <rect x="-30" y="-30" width="20" height="20" fill="#00E5FF" opacity="0.8" />
        <rect x="10" y="-30" width="20" height="20" fill="#00E5FF" opacity="0.8" />
        <rect x="-30" y="10" width="20" height="20" fill="#00E5FF" opacity="0.8" />
        <rect x="10" y="10" width="20" height="20" fill="#00E5FF" opacity="0.8" />
        <path d="M-10 -10 L10 10 M10 -10 L-10 10" stroke="#FFFFFF" stroke-width="2" />
      </g>

      <!-- Equation Style Text -->
      <text x="170" y="180" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#00E5FF" text-anchor="middle" font-weight="bold">数据驱动 + 知识驱动</text>
      
      <text x="170" y="240" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">=</text>
      
      <text x="170" y="300" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-weight="bold">下一代 AI</text>
      
      <!-- Subtitle -->
      <text x="170" y="360" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#B0BEC5" text-anchor="middle">双轮驱动，突破纯数据学习的瓶颈</text>
    </g>

    <!-- Card 3: Trustworthy Systems -->
    <g transform="translate(860, 200)">
      <!-- Card Background -->
      <rect width="340" height="420" rx="16" fill="url(#cardGrad)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5" />
      
      <!-- Icon: Shield/Trust -->
      <g transform="translate(170, 80)">
        <path d="M0,-35 L30,-20 L30,10 C30,30 0,45 0,45 C0,45 -30,30 -30,10 L-30,-20 Z" fill="none" stroke="#00E5FF" stroke-width="3" />
        <path d="M-10,5 L-2,15 L15,-5" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      </g>

      <!-- Equation Style Text -->
      <text x="170" y="180" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#00E5FF" text-anchor="middle" font-weight="bold">知识图谱 + 大模型</text>
      
      <text x="170" y="240" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">=</text>
      
      <text x="170" y="290" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">更可信、更可解释</text>
      <text x="170" y="330" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">的智能系统</text>
      
      <!-- Subtitle -->
      <text x="170" y="390" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#B0BEC5" text-anchor="middle">解决幻觉问题，实现人机协作增强</text>
    </g>

  </g>

  <!-- Footer / Call to Action -->
  <g id="footer" transform="translate(640, 660)">
    <text x="0" y="0" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#00E5FF" text-anchor="middle" letter-spacing="2">THANKS FOR WATCHING</text>
  </g>

</svg>