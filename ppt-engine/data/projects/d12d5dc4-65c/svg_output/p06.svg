<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  
  <g id="header">
    <text x="640" y="75" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="38" font-weight="bold" fill="#0F172A" text-anchor="middle">知识图谱构建流程</text>
    <line x1="480" y1="100" x2="800" y2="100" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="background-accent">
    <ellipse cx="640" cy="370" rx="580" ry="150" fill="#EFF6FF" opacity="0.6"/>
  </g>

  <g id="connector-line">
    <path d="M 275 370 L 1125 370" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8,6" fill="none"/>
  </g>

  <g id="step1">
    <rect x="125" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="200" cy="315" r="16" fill="#2563EB"/>
    <text x="200" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="200" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">数据采集</text>
    <text x="200" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">多源异构数据获取</text>
  </g>

  <g id="step2">
    <rect x="325" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="400" cy="315" r="16" fill="#2563EB"/>
    <text x="400" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="400" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">知识抽取</text>
    <text x="400" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">实体、关系、属性抽取</text>
  </g>

  <g id="step3">
    <rect x="525" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="600" cy="315" r="16" fill="#2563EB"/>
    <text x="600" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="600" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">知识融合</text>
    <text x="600" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">实体对齐与消歧</text>
  </g>

  <g id="step4">
    <rect x="725" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="800" cy="315" r="16" fill="#2563EB"/>
    <text x="800" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="800" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">知识存储</text>
    <text x="800" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">图数据库建模与导入</text>
  </g>

  <g id="step5">
    <rect x="925" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="1000" cy="315" r="16" fill="#2563EB"/>
    <text x="1000" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
    <text x="1000" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">质量评估</text>
    <text x="1000" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">一致性、完整性、准确性校验</text>
  </g>

  <g id="step6">
    <rect x="1125" y="280" width="150" height="180" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="1200" cy="315" r="16" fill="#2563EB"/>
    <text x="1200" y="321" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
    <text x="1200" y="355" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">持续更新</text>
    <text x="1200" y="380" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">增量学习与动态维护</text>
  </g>

  <g id="arrows">
    <polygon points="325,363 335,370 325,377" fill="#94A3B8"/>
    <polygon points="525,363 535,370 525,377" fill="#94A3B8"/>
    <polygon points="725,363 735,370 725,377" fill="#94A3B8"/>
    <polygon points="925,363 935,370 925,377" fill="#94A3B8"/>
    <polygon points="1125,363 1135,370 1125,377" fill="#94A3B8"/>
  </g>

  <g id="footer">
    <line x1="80" y1="680" x2="1200" y2="680" stroke="#E2E8F0" stroke-width="1"/>
    <text x="1240" y="695" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8" text-anchor="end">6 / 12</text>
  </g>
</svg>